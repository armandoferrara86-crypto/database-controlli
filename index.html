    else setPhase("setup");
  },[]);

  useEffect(()=>{
    if(phase!=="app"||!dbRef.current) return;
    setLoading(true);
    const unsub=dbRef.current.collection(COLL).orderBy("creatoIl","desc").onSnapshot(snap=>{setRecords(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);},()=>setLoading(false));
    return ()=>unsub();
  },[phase]);

  const handleSetup=cfg=>{ try{firebase.app();}catch(_){firebase.initializeApp(cfg);} dbRef.current=firebase.firestore(); setPhase("login"); };
  const handleLogin=(nome,matricola)=>{ const op={nome,matricola}; sessionStorage.setItem(OP_KEY,JSON.stringify(op)); setOperatore(op); setPhase("app"); setTimeout(()=>{ if(dbRef.current) dbRef.current.collection(COLL_LOG).add({azione:"login",dettaglio:"Accesso effettuato",operatore:nome,matricola:matricola||"",timestamp:firebase.firestore.FieldValue.serverTimestamp()}); },500); };
  const [showOperatori,setShowOperatori]=useState(false);
  const [showLog,setShowLog]=useState(false);
  const [fixingDates,setFixingDates]=useState(false);

  // Correzione di massa: normalizza tutte le date nel formato standard
  const correggiDate = async () => {
    if(fixingDates) return;
    // Analizza prima quanti record hanno date da correggere
    const daCorreggere = records.filter(r=>{
      const norm = normalizzaData(r.data);
      return norm && norm !== r.data;
    });
    const nonRiconosciute = records.filter(r=>r.data && !normalizzaData(r.data));

    if(daCorreggere.length===0 && nonRiconosciute.length===0){
      alert("✅ Tutte le date sono già nel formato corretto!");
      return;
    }

    let msg = `Trovate ${daCorreggere.length} date da correggere.\n\n`;
    if(daCorreggere.length>0){
      msg += "Esempi:\n" + daCorreggere.slice(0,5).map(r=>`• ${r.nomeEsercizio}: "${r.data}" → "${normalizzaData(r.data)}"`).join("\n");
    }
    if(nonRiconosciute.length>0){
      msg += `\n\n⚠️ ${nonRiconosciute.length} date NON riconoscibili (verranno lasciate invariate):\n` + nonRiconosciute.slice(0,3).map(r=>`• ${r.nomeEsercizio}: "${r.data}"`).join("\n");
    }
    msg += "\n\nProcedere con la correzione?";

    if(!window.confirm(msg)) return;

    setFixingDates(true);
    try {
      const batch = dbRef.current.batch();
      daCorreggere.forEach(r=>{
        const ref = dbRef.current.collection(COLL).doc(r.id);
        batch.update(ref, {data: normalizzaData(r.data)});
      });
      await batch.commit();
      logAzione("modifica",`Correzione di massa formato date: ${daCorreggere.length} record uniformati`);
      alert(`✅ Corrette ${daCorreggere.length} date!\nOra tutte le date sono nel formato uniforme e verranno mostrate come GG/MM/AAAA.`);
    } catch(e){
      alert("❌ Errore durante la correzione. Riprova.");
    }
    setFixingDates(false);
  };
  const [menuOpen,setMenuOpen]=useState(false);
  const isMobile = typeof window!=="undefined" && window.innerWidth<=768;

  // Funzione di logging centralizzata
  const logAzione = React.useCallback(async (azione, dettaglio="") => {
    if(!dbRef.current || !operatore) return;
    try {
      await dbRef.current.collection(COLL_LOG).add({
        azione, dettaglio,
        operatore: operatore.nome,
        matricola: operatore.matricola||"",
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(_){}
  },[operatore]);

  const handleSave=async f=>{
    const now=firebase.firestore.FieldValue.serverTimestamp();
    if(editing){
      await dbRef.current.collection(COLL).doc(editing.id).update({...f,modificatoDa:operatore.nome,modificatoIl:now});
      logAzione("modifica",`Modificato: ${f.nomeEsercizio} — ${fmt(f.data)}`);
      setEditing(null);
    } else {
      await dbRef.current.collection(COLL).add({...f,creatoDA:operatore.nome,creatoMatricola:operatore.matricola||"",creatoIl:now});
      logAzione("inserimento",`Inserito: ${f.nomeEsercizio} — ${fmt(f.data)}`);
    }
    setShowAdd(false);
  };

  const handleImport=async rows=>{
    const now=firebase.firestore.FieldValue.serverTimestamp();
    const batch=dbRef.current.batch();
    rows.forEach(r=>{
      const {_agenti,...rest}=r;
      const ref=dbRef.current.collection(COLL).doc();
      batch.set(ref,{...rest,_agenti:_agenti||"",creatoDA:operatore.nome,creatoMatricola:operatore.matricola||"",creatoIl:now});
    });
    await batch.commit();
    logAzione("importazione",`Importati ${rows.length} record da file Excel`);
  };

  const handleDelete=async id=>{ const r=records.find(x=>x.id===id); await dbRef.current.collection(COLL).doc(id).delete(); logAzione("eliminazione",`Eliminato: ${r?.nomeEsercizio||"—"} — ${fmt(r?.data)}`); setConfirm(null); };

  const gruppi=records.reduce((acc,r)=>{
    const key=(r.nomeEsercizio||"").trim().toLowerCase(); if(!key) return acc;
    if(!acc[key]) acc[key]={nomeEsercizio:r.nomeEsercizio,indirizzo:r.indirizzo,titolare:r.titolare,piva:r.piva,tipo:r.tipo,interventi:[]};
    acc[key].interventi.push(r); return acc;
  },{});
  const gruppiList=Object.values(gruppi).sort((a,b)=>b.interventi.length-a.interventi.length);

  const filtered=records.filter(r=>{
    const q=search.toLowerCase();
    const mq=!q||(()=>{
      const ags=Array.isArray(r.agentiOp)?r.agentiOp.join(" "):(r.agentiOp||r._agenti||"");
      return [r.nomeEsercizio,r.indirizzo,r.legaleRappresentante||r.titolare||"",r.ragioneSociale||"",r.tipo||"",r.tipoAttivita||"",r.creatoDA||"",ags].some(s=>s.toLowerCase().includes(q));
    })();
    const mp=!filterProv||r.provvedimento===filterProv;
    const mt=!filterTag||(()=>{ const cat=CATEGORIE_TAG.find(c=>c.id===filterTag); return cat?recordInCategoria(r,cat):true; })();
    const mTipo=!filterTipo||(filterTipo==='commerciale'?r.tipoAttivita==="Attività Commerciale":r.tipoAttivita==="Attività Ricettiva Extralberghiera");
    return mq&&mp&&mt&&mTipo;
  });

  // Ordinamento
  const sortedFiltered = [...filtered].sort((a,b)=>{
    let va,vb;
    if(sortBy==="data")       { va=a.data||""; vb=b.data||""; }
    else if(sortBy==="nome")  { va=(a.nomeEsercizio||"").toLowerCase(); vb=(b.nomeEsercizio||"").toLowerCase(); }
    else if(sortBy==="titolare"){ va=(a.titolare||"").toLowerCase(); vb=(b.titolare||"").toLowerCase(); }
    else if(sortBy==="provvedimento"){ va=(a.provvedimento||"").toLowerCase(); vb=(b.provvedimento||"").toLowerCase(); }
    else if(sortBy==="tipo_att"){ va=(a.tipoAttivita||"").toLowerCase(); vb=(b.tipoAttivita||"").toLowerCase(); }
    else if(sortBy==="violazioni"){ va=a.violazioniRiscontrate?.length||0; vb=b.violazioniRiscontrate?.length||0; }
    else { va=""; vb=""; }
    if(va<vb) return sortDir==="asc"?-1:1;
    if(va>vb) return sortDir==="asc"?1:-1;
    return 0;
  });

  const toggleSort = col => {
    if(sortBy===col) setSortDir(d=>d==="asc"?"desc":"asc");
    else { setSortBy(col); setSortDir("asc"); }
  };

  const SortIcon = ({col}) => {
    if(sortBy!==col) return <span style={{color:"#3a4a6a",marginLeft:3}}>⇅</span>;
    return <span style={{color:"#c9a84c",marginLeft:3}}>{sortDir==="asc"?"↑":"↓"}</span>;
  };

  const totViol=records.reduce((s,r)=>s+(r.motivoControllo?.length||0),0);
  const denunce=records.filter(r=>r.provvedimento?.toLowerCase().includes("denuncia")).length;
  const cut=new Date(); cut.setMonth(cut.getMonth()-1);
  const ultimoMese=records.filter(r=>r.data&&new Date(r.data)>=cut).length;

  if(phase==="loading") return <div style={{minHeight:"100vh",background:"#0f1117",display:"flex",alignItems:"center",justifyContent:"center",color:"#7a859e"}}>⏳ Caricamento…</div>;
  if(phase==="setup")   return <SetupScreen onSave={handleSetup}/>;
  if(phase==="login")   return <LoginScreen onLogin={handleLogin} db={dbRef.current}/>;

  return (
    <div style={{minHeight:"100vh",background:"#0f1117",color:"#e8e6df"}}>
      {/* HEADER */}
      <header className="no-print" style={{background:"#0a0d13",borderBottom:"1px solid #1a2035",padding:"0 28px",position:"sticky",top:0,zIndex:50,overflow:"visible"}}>

        {/* ── BARRA TOP ── */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:10,paddingBottom:8,borderBottom:"1px solid #141824"}}>

          {/* BADGE NEON U.O. San Lorenzo */}
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{
              position:"relative",
              border:"1px solid #7eb8f7",
              borderRadius:5,
              padding:"3px 12px",
              fontSize:10,
              fontWeight:700,
              letterSpacing:"0.13em",
              textTransform:"uppercase",
              color:"#7eb8f7",
              textShadow:"0 0 8px #7eb8f7, 0 0 18px #3a8fd4",
              boxShadow:"0 0 6px #7eb8f730, inset 0 0 8px #7eb8f710",
              background:"#070c14",
            }}>
              U.O. San Lorenzo — Polizia Amministrativa
            </div>
            {/* Pallino online */}
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{
                width:7,height:7,borderRadius:"50%",
                background:"#52b788",
                boxShadow:"0 0 6px #52b788, 0 0 12px #52b78880",
                animation:"pulse 2s infinite",
              }}></div>
              <span style={{fontSize:10,color:"#52b788",letterSpacing:"0.06em",fontWeight:500}}>ONLINE</span>
            </div>
          </div>

          {/* Controlli a destra */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:7,background:"#141824",border:"1px solid #2a3049",borderRadius:20,padding:"4px 12px 4px 6px"}}>
              <Avatar name={operatore.nome} size={22}/>
              <span style={{fontSize:12,color:"#e8e6df"}}>{operatore.nome}</span>
              {operatore.matricola&&<span style={{fontSize:11,color:"#7a859e"}}>· {operatore.matricola}</span>}
            </div>
            {/* Bottoni desktop */}
            <div className="desktop-only" style={{display:"flex",gap:6}}>
              <button onClick={()=>{sessionStorage.removeItem(OP_KEY);setOperatore(null);setPhase("login");}} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:11,padding:"4px 10px",borderRadius:6,cursor:"pointer"}}>Esci</button>
              <button onClick={correggiDate} disabled={fixingDates} style={{background:"none",border:"1px solid #2a3049",color:fixingDates?"#5a4a1e":"#7a859e",fontSize:11,padding:"4px 10px",borderRadius:6,cursor:"pointer"}} title="Correggi formato date">{fixingDates?"⏳":"🔧"}</button>
              <button onClick={()=>setShowLog(true)} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:11,padding:"4px 10px",borderRadius:6,cursor:"pointer"}} title="Log attività">📋</button>
              <button onClick={()=>setShowOperatori(true)} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:11,padding:"4px 10px",borderRadius:6,cursor:"pointer"}} title="Gestione accessi">🔐</button>
              <button onClick={()=>{localStorage.removeItem(CFG_KEY);window.location.reload();}} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:11,padding:"4px 10px",borderRadius:6,cursor:"pointer"}} title="Cambia database">⚙️</button>
            </div>
            {/* Menu hamburger mobile */}
            <button className="mobile-only" onClick={()=>setMenuOpen(o=>!o)}
              style={{background:"none",border:"1px solid #2a3049",color:"#e8e6df",fontSize:18,padding:"5px 10px",borderRadius:6,cursor:"pointer",display:"none"}}>
              ☰
            </button>
          </div>
          {/* Dropdown menu mobile */}
          {menuOpen&&(
            <div className="mobile-only" style={{display:"none",position:"absolute",top:60,right:14,background:"#181c27",border:"1px solid #2a3049",borderRadius:10,padding:8,zIndex:200,minWidth:200,boxShadow:"0 8px 24px rgba(0,0,0,.6)"}}>
              {[
                {icon:"🚪",label:"Esci", action:()=>{sessionStorage.removeItem(OP_KEY);setOperatore(null);setPhase("login");setMenuOpen(false);}},
                {icon:"🔧",label:"Correggi formato date", action:()=>{correggiDate();setMenuOpen(false);}},
                {icon:"📋",label:"Log attività", action:()=>{setShowLog(true);setMenuOpen(false);}},
                {icon:"🔐",label:"Gestione accessi", action:()=>{setShowOperatori(true);setMenuOpen(false);}},
                {icon:"⚙️",label:"Cambia database", action:()=>{localStorage.removeItem(CFG_KEY);window.location.reload();}},
              ].map(({icon,label,action})=>(
                <button key={label} onClick={action} style={{width:"100%",background:"none",border:"none",color:"#e8e6df",fontSize:13,padding:"10px 14px",borderRadius:7,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                  <span>{icon}</span><span>{label}</span>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* ── TITOLO + CHIP ── */}
        <div style={{paddingTop:10,paddingBottom:12,display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{display:"flex",alignItems:"baseline",flexWrap:"wrap",lineHeight:1.1}}>
              <span style={{fontSize:30,fontWeight:800,color:"#e8e6df",letterSpacing:"-0.02em"}}>Registro&nbsp;</span>
              <span style={{fontSize:30,fontWeight:800,color:"#c9a84c",letterSpacing:"-0.02em"}}>Controlli Commerciali</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,flexWrap:"wrap"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#c9a84c",flexShrink:0}}></div>
              <span style={{fontSize:11,color:"#7a859e",letterSpacing:"0.05em"}}>Multi-utente · Tempo reale · {records.length} record</span>
            </div>
          </div>

          {/* CHIP NEON FILTRO TIPO ATTIVITÀ */}
          <div className="header-chips" style={{display:"flex",gap:12,alignItems:"center",justifyContent:"center"}}>
            {[
              {key:"commerciale", label:"Attività Commerciale",              icon:"🏪", match:"Attività Commerciale",              color:"#c9a84c", glow:"#c9a84c"},
              {key:"ricettiva",   label:"Attività Ricettiva Extralberghiera", icon:"🏠", match:"Attività Ricettiva Extralberghiera", color:"#7eb8f7", glow:"#7eb8f7"},
            ].map(({key,label,icon,match,color,glow})=>{
              const n=records.filter(r=>r.tipoAttivita===match).length;
              const active=filterTipo===key;
              return (
                <button key={key} onClick={()=>setFilterTipo(active?"":key)} style={{
                  background: active?"#070c14":"#070c14",
                  border:`1px solid ${active?color:color+"50"}`,
                  borderRadius:5,
                  padding:"5px 16px",
                  cursor:"pointer",
                  transition:"all .25s",
                  display:"flex", alignItems:"center", gap:8,
                  boxShadow: active?`0 0 8px ${glow}50, 0 0 18px ${glow}30, inset 0 0 10px ${glow}15`:"none",
                }}>
                  <span style={{fontSize:14}}>{icon}</span>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-start",gap:1}}>
                    <span style={{
                      fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase",
                      color: active?color:color+"80",
                      textShadow: active?`0 0 8px ${glow}, 0 0 18px ${glow}90`:"none",
                      lineHeight:1.2,
                    }}>{label}</span>
                    <span style={{
                      fontSize:13, fontWeight:800,
                      color: active?color:color+"70",
                      textShadow: active?`0 0 10px ${glow}`:"none",
                      lineHeight:1,
                    }}>{n} {n===1?"record":"record"}</span>
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        <style>{`
          @keyframes pulse {
            0%,100%{opacity:1;transform:scale(1)}
            50%{opacity:.6;transform:scale(1.3)}
          }
        `}</style>
      </header>

      {/* STATS */}
      <div className="no-print stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,padding:"20px 24px"}}>
        {[{label:"Controlli totali",value:records.length,sub:"nel database",color:"#c9a84c"},{label:"Ultimo mese",value:ultimoMese,sub:"recenti",color:"#7eb8f7"},{label:"Violazioni",value:totViol,sub:"infrazioni",color:"#e05252"},{label:"Denunce",value:denunce,sub:"provvedimenti",color:"#52b788"}].map(s=>(
          <div key={s.label} style={{background:"#1e2334",border:"1px solid #2a3049",borderRadius:10,padding:"14px 18px"}}>
            <div style={{fontSize:10,color:"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:4}}>{s.label}</div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:30,fontWeight:700,lineHeight:1,color:s.color}}>{loading?"…":s.value}</div>
            <div style={{fontSize:11,color:"#7a859e",marginTop:4}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* TAB + TOOLBAR */}
      <div className="no-print toolbar-wrap" style={{padding:"0 24px 14px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",background:"#1e2334",borderRadius:8,padding:3,gap:2}}>
          {[["lista","📋 Lista"],["schede","🏪 Schede esercizi"],["stats","📊 Statistiche"],["reportra","📄 Report RA"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#c9a84c":"none",color:view===v?"#0f1117":"#7a859e",border:"none",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:view===v?600:400,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div>
        {view==="lista"&&<>
          <div style={{flex:1,minWidth:180,position:"relative"}}>
            <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#7a859e",pointerEvents:"none"}}>🔍</span>
            <input placeholder="Cerca…" value={search} onChange={e=>setSearch(e.target.value)} style={{...INP,padding:"8px 12px 8px 34px",borderRadius:8}}/>
          </div>
          <select value={filterProv} onChange={e=>setFilterProv(e.target.value)} style={{...INP,width:"auto",cursor:"pointer",borderRadius:8,padding:"8px 12px"}}>
            <option value="">Tutti i provvedimenti</option>
            {PROVVEDIMENTI.map(p=><option key={p}>{p}</option>)}
          </select>
          {records.length>0&&<button onClick={()=>{exportCSV(records);logAzione("export_csv",`Esportati ${records.length} record in CSV`);}} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:12,padding:"8px 12px",borderRadius:8,cursor:"pointer",whiteSpace:"nowrap"}}>⬇ CSV</button>}
        </>}
        <div className="toolbar-main-btns" style={{marginLeft:"auto",display:"flex",gap:8}}>
          <button onClick={()=>setShowImport(true)} style={{background:"none",border:"1px solid #52b788",color:"#52b788",fontSize:13,fontWeight:600,padding:"8px 16px",borderRadius:8,cursor:"pointer",whiteSpace:"nowrap"}}>⬆ Importa Excel</button>
          <button onClick={()=>setShowAdd(true)} style={{background:"#c9a84c",color:"#0f1117",fontSize:13,fontWeight:600,padding:"8px 18px",border:"none",borderRadius:8,cursor:"pointer",whiteSpace:"nowrap"}}>+ Nuovo controllo</button>
        </div>
      </div>

      {/* TAG FILTER BAR */}
      {view==="lista"&&records.length>0&&(
        <div className="no-print tag-bar" style={{padding:"0 24px 12px",overflowX:"auto"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:"#7a859e",flexShrink:0,marginRight:2}}>Filtra per categoria:</span>
            <button onClick={()=>setFilterTag("")}
              style={{background:filterTag===""?"#c9a84c":"#1e2334",color:filterTag===""?"#0f1117":"#7a859e",border:"1px solid",borderColor:filterTag===""?"#c9a84c":"#2a3049",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s"}}>
              Tutti ({records.length})
            </button>
            {CATEGORIE_TAG.map(cat=>{
              const count=records.filter(r=>recordInCategoria(r,cat)).length;
              if(count===0) return null;
              const active=filterTag===cat.id;
              return (
                <button key={cat.id} onClick={()=>{const next=active?"":cat.id;setFilterTag(next);if(next)logAzione("ricerca_tag",`Filtro tag: ${cat.label}`);}}
                  style={{background:active?cat.bg:"#1e2334",color:active?cat.color:"#7a859e",border:"1px solid",borderColor:active?cat.color:"#2a3049",borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s"}}>
                  {cat.label} <span style={{opacity:.8}}>({count})</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* LISTA */}
      {view==="lista"&&(
        <div className="no-print lista-wrap" style={{padding:"0 24px 40px",overflowX:"auto"}}>
          {loading?<div style={{textAlign:"center",padding:"64px",color:"#7a859e"}}>⏳ Connessione…</div>
          :filtered.length===0?<div style={{textAlign:"center",padding:"64px 24px",color:"#7a859e"}}><div style={{fontSize:48,marginBottom:16}}>🗂</div><div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,color:"#e8e6df"}}>{records.length===0?"Nessun controllo registrato":"Nessun risultato"}</div><div style={{fontSize:13,marginTop:6}}>{records.length===0?'Clicca "+ Nuovo controllo" o "Importa Excel"':"Modifica i filtri"}</div></div>
          :<>
            {/* MOBILE CARDS */}
            <div className="mobile-cards" style={{display:"none"}}>
              {sortedFiltered.map(r=>(
                <div key={r.id} onClick={()=>{setDetail(r);logAzione("consultazione",`Consultato: ${r.nomeEsercizio} — ${fmt(r.data)}`);}}
                  style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:10,padding:"14px 16px",cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nomeEsercizio}</div>
                      {r.tipoAttivita&&<div style={{fontSize:10,color:r.tipoAttivita.includes("Ricettiva")?"#7eb8f7":"#c9a84c",fontWeight:500,marginTop:1}}>{r.tipoAttivita.includes("Ricettiva")?"🏠":"🏪"} {r.tipoAttivita}</div>}
                      <div style={{fontSize:12,color:"#7a859e",marginTop:2}}>{r.indirizzo}</div>
                    </div>
                    {r.provvedimento&&<Badge label={r.provvedimento} fg={pCol(r.provvedimento)} bg={pBg(r.provvedimento)}/>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:12,marginBottom:8}}>
                    <div><span style={{color:"#7a859e"}}>Data: </span><span>{fmt(r.data)}{r.ora?` ${r.ora}`:""}</span></div>
                    <div><span style={{color:"#7a859e"}}>Titolare: </span><span>{r.titolare||"—"}</span></div>
                    {r.numeroVerbale&&<div><span style={{color:"#7a859e"}}>Verbale: </span><span style={{color:"#c9a84c"}}>{r.numeroVerbale}</span></div>}
                    {(()=>{
                    const ags=Array.isArray(r.agentiOp)?r.agentiOp:(r.agentiOp?r.agentiOp.split(",").map(s=>s.trim()).filter(Boolean):(r._agenti?r._agenti.split(",").map(s=>s.trim()).filter(Boolean):[]));
                    if(!ags.length) return <div><span style={{color:"#7a859e"}}>Agenti: </span><span style={{fontSize:11}}>{r.creatoDA||"—"}</span></div>;
                    return <div style={{gridColumn:"1/-1",display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}><span style={{color:"#7a859e",fontSize:11}}>Agenti:</span>{ags.map((a,i)=><span key={i} style={{background:hCol(a)+"30",color:hCol(a),border:`1px solid ${hCol(a)}60`,fontSize:10,padding:"2px 7px",borderRadius:999,fontWeight:600}}>{a}</span>)}</div>;
                  })()}
                  </div>
                  {r.violazioniRiscontrate?.length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                      {r.violazioniRiscontrate.map((v,i)=>{ const c=violColor(v); return <span key={i} style={{background:c.bg,color:c.fg,fontSize:10,padding:"2px 7px",borderRadius:999}}>{v}</span>; })}
                    </div>
                  )}
                  <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10,paddingTop:8,borderTop:"1px solid #2a3049"}}>
                    <button onClick={e=>{e.stopPropagation();setEditing(r);}} style={{background:"none",border:"1px solid #2a3049",color:"#c9a84c",fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer"}}>✏️ Modifica</button>
                    <button onClick={e=>{e.stopPropagation();setConfirm(r.id);}} style={{background:"none",border:"1px solid #5a1a1a",color:"#e05252",fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer"}}>🗑</button>
                  </div>
                </div>
              ))}
            </div>

            {/* DESKTOP TABLE */}
            <table className="desktop-table" style={{width:"100%",borderCollapse:"collapse",minWidth:820}}>
            <thead><tr style={{borderBottom:"2px solid #2a3049"}}>
              {[
                {label:"Data",         col:"data"},
                {label:"Tipologia",    col:"tipo_att"},
                {label:"Esercizio",    col:"nome"},
                {label:"Legale Rapp.", col:"titolare"},
                {label:"Motivo",       col:null},
                {label:"Violazioni",   col:"violazioni"},
                {label:"Provvedimento",col:"provvedimento"},
                {label:"Agenti/Op.",   col:null},
                {label:"",             col:null},
              ].map(({label,col},i)=>(
                <th key={i} onClick={col?()=>toggleSort(col):undefined}
                  style={{fontSize:11,fontWeight:500,color:sortBy===col?"#c9a84c":"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",padding:"8px 10px",textAlign:"left",cursor:col?"pointer":"default",userSelect:"none",whiteSpace:"nowrap"}}>
                  {label}{col&&<SortIcon col={col}/>}
                </th>
              ))}
            </tr></thead>
            <tbody>
              {sortedFiltered.map(r=>(
                <tr key={r.id} style={{borderBottom:"1px solid #2a3049",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#1e2334"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td onClick={()=>{setDetail(r);logAzione("consultazione",`Consultato: ${r.nomeEsercizio} — ${fmt(r.data)}`);}} style={{padding:"10px",fontSize:12,color:"#7a859e",whiteSpace:"nowrap"}}>{fmt(r.data)}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px"}}>
                    {r.tipoAttivita
                      ?<span style={{
                          background:r.tipoAttivita.includes("Ricettiva")?"#1a2640":"#3a2e0e",
                          color:r.tipoAttivita.includes("Ricettiva")?"#7eb8f7":"#c9a84c",
                          border:`1px solid ${r.tipoAttivita.includes("Ricettiva")?"#7eb8f760":"#c9a84c60"}`,
                          fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:4,
                          textShadow:r.tipoAttivita.includes("Ricettiva")?"0 0 6px #7eb8f780":"0 0 6px #c9a84c80",
                          whiteSpace:"nowrap"
                        }}>
                          {r.tipoAttivita.includes("Ricettiva")?"🏠 Ricettiva":"🏪 Commerciale"}
                        </span>
                      :<span style={{color:"#7a859e",fontSize:11}}>—</span>}
                  </td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px",fontSize:14,fontWeight:600}}>{r.nomeEsercizio}{r.tipo&&<div style={{fontSize:11,color:"#7a859e",fontWeight:400}}>{r.tipo}</div>}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px",fontSize:13,color:"#7a859e"}}>{r.legaleRappresentante||r.titolare||"—"}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px",maxWidth:180}}>
                    {r.motivoControllo?.length
                      ? <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{r.motivoControllo.map((m,i)=><span key={i} style={{background:"#252d42",color:"#c9a84c",fontSize:10,padding:"2px 7px",borderRadius:999,whiteSpace:"nowrap"}}>{m}</span>)}</div>
                      : <span style={{fontSize:11,color:"#7a859e"}}>—</span>}
                  </td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px",maxWidth:220}}>
                    {r.violazioniRiscontrate?.length
                      ? <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{r.violazioniRiscontrate.map((v,i)=>{ const c=violColor(v); return <span key={i} style={{background:c.bg,color:c.fg,fontSize:10,padding:"2px 7px",borderRadius:999,whiteSpace:"nowrap"}}>{v}</span>; })}</div>
                      : <Badge label="Nessuna" fg="#52b788" bg="#1a3d2e"/>}
                  </td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px"}}>{(()=>{ const provs=r.provvedimenti?.length>0?r.provvedimenti.filter(p=>p.tipo||p):(r.provvedimento?[r.provvedimento]:[]); if(!provs.length) return <Badge label="—" fg="#7a859e" bg="#252d42"/>; return <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{provs.map((p,i)=>{ const t=typeof p==="string"?p:p.tipo; return t?<Badge key={i} label={t} fg={pCol(t)} bg={pBg(t)}/>:null; })}</div>; })()}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"10px",maxWidth:200}}>
                    {(()=>{
                      const ags=Array.isArray(r.agentiOp)?r.agentiOp:(r.agentiOp?r.agentiOp.split(",").map(s=>s.trim()).filter(Boolean):(r._agenti?r._agenti.split(",").map(s=>s.trim()).filter(Boolean):[]));
                      if(!ags.length) return <span style={{fontSize:12,color:"#7a859e"}}>{r.creatoDA||"—"}</span>;
                      return <div style={{display:"flex",flexWrap:"wrap",gap:3}}>{ags.map((a,i)=>(
                        <span key={i} style={{background:hCol(a)+"30",color:hCol(a),border:`1px solid ${hCol(a)}60`,fontSize:10,padding:"2px 7px",borderRadius:999,fontWeight:600,whiteSpace:"nowrap"}}>{a}</span>
                      ))}</div>;
                    })()}
                  </td>
                  <td style={{padding:"10px",whiteSpace:"nowrap"}}>
                    <button onClick={()=>setEditing(r)} style={{background:"none",border:"none",color:"#7a859e",cursor:"pointer",fontSize:15,marginRight:4}}>✏️</button>
                    <button onClick={()=>setConfirm(r.id)} style={{background:"none",border:"none",color:"#7a859e",cursor:"pointer",fontSize:15}}>🗑</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table></>}
        </div>
      )}

      {/* SCHEDE */}
      {view==="schede"&&(
        <div className="no-print" style={{padding:"0"}}>  
          {gruppiList.length===0?<div style={{textAlign:"center",padding:"64px 24px",color:"#7a859e"}}><div style={{fontSize:48,marginBottom:16}}>🏪</div><div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,color:"#e8e6df"}}>Nessun esercizio registrato</div></div>
          :<div className="schede-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14,padding:"0 24px 40px"}}>
            {gruppiList.map(g=>{
              const totV=g.interventi.reduce((s,r)=>s+(r.motivoControllo?.length||0),0);
              const provSet=[...new Set(g.interventi.map(r=>r.provvedimento).filter(Boolean))];
              return (
                <div key={g.nomeEsercizio} style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:12,padding:18}} onMouseEnter={e=>e.currentTarget.style.borderColor="#c9a84c50"} onMouseLeave={e=>e.currentTarget.style.borderColor="#2a3049"}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.nomeEsercizio}</div><div style={{fontSize:12,color:"#7a859e",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.indirizzo}</div></div>
                    <div style={{background:"#c9a84c",color:"#0f1117",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700,flexShrink:0,marginLeft:8}}>{g.interventi.length} int.</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 12px",marginBottom:12,fontSize:12}}>
                    <div><span style={{color:"#7a859e"}}>Titolare: </span><span>{g.titolare||"—"}</span></div>
                    <div><span style={{color:"#7a859e"}}>Tipo: </span><span>{g.tipo||"—"}</span></div>
                    <div><span style={{color:"#7a859e"}}>Violazioni: </span><span style={{color:totV>0?"#e05252":"#52b788"}}>{totV}</span></div>
                    <div><span style={{color:"#7a859e"}}>Ultimo: </span><span>{fmt(g.interventi[0]?.data)}</span></div>
                  </div>
                  {provSet.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>{provSet.map((p,i)=><Badge key={i} label={p} fg={pCol(p)} bg={pBg(p)}/>)}</div>}
                  <button onClick={()=>setScheda({esercizio:g,interventi:g.interventi})} style={{width:"100%",background:"none",border:"1px solid #c9a84c50",color:"#c9a84c",borderRadius:7,padding:"7px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋 Apri scheda · Genera PDF</button>
                </div>
              );
            })}
          </div>}
        </div>
      )}


      {view==="reportra"&&(
        <ReportRAView records={records}/>
      )}

      {view==="stats"&&(
        <StatsView records={records} tariffario={tariffario} onOpenTariffario={()=>setShowTariffario(true)} onExportPDF={()=>{generaStatsPDF(records,tariffario);logAzione("report_pdf",`Esportato report statistico — ${records.length} record`);}}/>
      )}

      {/* FAB MOBILE — pulsante + fisso in basso */}
      <button className="mobile-only" onClick={()=>setShowAdd(true)} style={{
        display:"none",
        position:"fixed", bottom:24, right:20, zIndex:90,
        width:56, height:56, borderRadius:"50%",
        background:"#c9a84c", color:"#0f1117",
        fontSize:28, fontWeight:700,
        border:"none", cursor:"pointer",
        boxShadow:"0 4px 20px rgba(201,168,76,.5)",
        alignItems:"center", justifyContent:"center"
      }}>+</button>

      {/* MODALI */}
      {showLog&&<LogViewer db={dbRef.current} onClose={()=>setShowLog(false)}/>}
      {showOperatori&&<GestioneOperatoriModal db={dbRef.current} onClose={()=>setShowOperatori(false)}/>}
      {showTariffario&&<TariffarioModal tariffario={tariffario} onClose={()=>setShowTariffario(false)} onSave={saveTariffario}/>}
      {(showAdd||editing)&&<AddModal initial={editing} operatore={operatore} onClose={()=>{setShowAdd(false);setEditing(null);}} onSave={handleSave}/>}
      {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}
      {detail&&<DetailModal record={detail} onClose={()=>setDetail(null)} onDelete={id=>{setConfirm(id);setDetail(null);}} onEdit={r=>{setEditing(r);setDetail(null);}}/>}
      {scheda&&<SchedaModal esercizio={scheda.esercizio} interventi={scheda.interventi} onClose={()=>setScheda(null)} onPDF={()=>logAzione("scheda_pdf",`Scheda PDF: ${scheda.esercizio.nomeEsercizio} — ${scheda.interventi.length} interventi`)}/>}
      {confirm&&(
        <Overlay onBgClick={()=>setConfirm(null)}>
          <div style={{background:"#181c27",border:"1px solid #5a1a1a",borderRadius:12,padding:28,maxWidth:380,width:"100%"}}>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,fontWeight:700,marginBottom:10}}>Conferma eliminazione</div>
            <p style={{fontSize:14,color:"#7a859e",marginBottom:24,lineHeight:1.6}}>Sei sicuro? Il record verrà eliminato per tutti gli operatori.</p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={()=>setConfirm(null)} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:13,padding:"7px 16px",borderRadius:7,cursor:"pointer"}}>Annulla</button>
              <button onClick={()=>handleDelete(confirm)} style={{background:"#5a1a1a",border:"1px solid #8c2f2f",color:"#e05252",fontSize:13,fontWeight:600,padding:"7px 16px",borderRadius:7,cursor:"pointer"}}>🗑 Elimina</button>
            </div>
          </div>
        </Overlay>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
