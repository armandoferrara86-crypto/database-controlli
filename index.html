              <div style={{fontSize:30,flexShrink:0}}>{rep.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"var(--text-1)",marginBottom:3}}>{rep.titolo}</div>
                <div style={{fontSize:12,color:"var(--text-2)",lineHeight:1.5}}>{rep.desc}</div>
              </div>
              <button
                disabled={rs.length===0||generating===rep.id}
                onClick={()=>genera(rep.id)}
                style={{
                  background: rs.length>0&&generating!==rep.id ? rep.col : "#252d42",
                  color: rs.length>0&&generating!==rep.id ? "#fff" : "#4a5570",
                  border:"none",borderRadius:8,padding:"9px 18px",
                  fontSize:12,fontWeight:700,cursor:rs.length>0?"pointer":"not-allowed",
                  whiteSpace:"nowrap",flexShrink:0,minWidth:110,
                  transition:"all .15s"
                }}>
                {generating===rep.id ? "⏳ Generazione…" : "🖨️ Genera PDF"}
              </button>
            </div>
          ))}
        </div>

        {/* Footer */}
        <div style={{padding:"12px 24px",borderTop:"1px solid var(--rim)",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.05)",borderRadius:"0 0 14px 14px"}}>
          <div style={{fontSize:11,color:"var(--text-2)"}}>I PDF si aprono in una nuova scheda e si stampano automaticamente</div>
          <button onClick={onClose} style={{background:"none",border:"1px solid var(--rim)",color:"var(--text-2)",fontSize:13,padding:"7px 16px",borderRadius:7,cursor:"pointer"}}>Chiudi</button>
        </div>

      </div>
    </Overlay>
  );
}

// ─── STATISTICHE ─────────────────────────────────────────────────────────────
function StatsView({records, tariffario, onOpenTariffario, onExportPDF, db, operatore}){
  if(!records.length) return (
    <div style={{textAlign:"center",padding:"64px 24px",color:"var(--text-2)"}}>
      <div style={{fontSize:48,marginBottom:16}}>📊</div>
      <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,color:"var(--text-1)"}}>Nessun dato disponibile</div>
      <div style={{fontSize:13,marginTop:6}}>Inserisci dei controlli per vedere le statistiche</div>
    </div>
  );

  const perMese={};
  records.forEach(r=>{ if(!r.data) return; const [y,m]=r.data.split("-"); const k=`${y}-${m}`; perMese[k]=(perMese[k]||0)+1; });
  const mesiSorted=Object.entries(perMese).sort(([a],[b])=>a.localeCompare(b));
  const maxMese=Math.max(...mesiSorted.map(([,v])=>v),1);

  const perEsercizio={};
  records.forEach(r=>{ const k=(r.nomeEsercizio||"—").trim(); perEsercizio[k]=(perEsercizio[k]||0)+1; });
  const topEsercizi=Object.entries(perEsercizio).sort(([,a],[,b])=>b-a).slice(0,10);
  const maxEsercizio=Math.max(...topEsercizi.map(([,v])=>v),1);

  const perProv={};
  records.forEach(r=>{ const k=r.provvedimento||"Nessuno"; perProv[k]=(perProv[k]||0)+1; });
  const provList=Object.entries(perProv).sort(([,a],[,b])=>b-a);

  const perTipo={};
  records.forEach(r=>{ const k=(r.tipo||"Non specificato").trim(); perTipo[k]=(perTipo[k]||0)+1; });
  const tipoList=Object.entries(perTipo).sort(([,a],[,b])=>b-a).slice(0,8);
  const maxTipo=Math.max(...tipoList.map(([,v])=>v),1);

  const perViol={};
  records.forEach(r=>(r.violazioniRiscontrate||[]).forEach(v=>{ const k=v.trim(); perViol[k]=(perViol[k]||0)+1; }));
  const topViol=Object.entries(perViol).sort(([,a],[,b])=>b-a).slice(0,8);
  const maxViol=Math.max(...topViol.map(([,v])=>v),1);

  const perMotivo={};
  records.forEach(r=>(r.motivoControllo||[]).forEach(v=>{ const k=v.trim(); perMotivo[k]=(perMotivo[k]||0)+1; }));
  const topMotivi=Object.entries(perMotivo).sort(([,a],[,b])=>b-a).slice(0,6);
  const maxMotivo=Math.max(...topMotivi.map(([,v])=>v),1);

  const perAgente={};
  records.forEach(r=>{
    const ags=Array.isArray(r.agentiOp)&&r.agentiOp.length>0?r.agentiOp:(r.agentiOp?r.agentiOp.split(",").map(s=>s.trim()).filter(Boolean):(r._agenti?r._agenti.split(",").map(s=>s.trim()).filter(Boolean):[r.creatoDA].filter(Boolean)));
    ags.forEach(a=>{ perAgente[a]=(perAgente[a]||0)+1; });
  });
  const topAgenti=Object.entries(perAgente).sort(([,a],[,b])=>b-a).slice(0,8);
  const maxAgente=Math.max(...topAgenti.map(([,v])=>v),1);

  const totViolazioni=records.reduce((s,r)=>s+(r.violazioniRiscontrate?.length||0),0);
  const conViolazioni=records.filter(r=>r.violazioniRiscontrate?.length>0).length;
  const percViolazioni=records.length>0?Math.round(conViolazioni/records.length*100):0;

  const Card=({title,children})=>(
    <div style={{background:"rgba(10,14,22,0.82)",border:"0.5px solid rgba(255,255,255,0.14)",borderRadius:12,padding:20}}>
      <div style={{fontSize:11,color:"var(--accent)",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,marginBottom:16,paddingBottom:8,borderBottom:"1px solid var(--rim)"}}>{title}</div>
      {children}
    </div>
  );

  const BarRow=({label,value,max,color="#c9a84c"})=>(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
        <span style={{color:"var(--text-1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"80%"}}>{label}</span>
        <span style={{color:color,fontWeight:600,flexShrink:0,marginLeft:8}}>{value}</span>
      </div>
      <div style={{height:6,background:"var(--bg)",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.round(value/max*100)}%`,background:color,borderRadius:3}}></div>
      </div>
    </div>
  );

  const provColors={"Denuncia":"#e05252","Denuncia + Sequestro":"#ff6b6b","Segnalazione uffici":"#c9a84c","Diffida":"#7eb8f7","Verbalizzato":"#b07af7","Nessuno":"#52b788","Altro":"#7a859e"};
  const mesiLabel=k=>{ const [y,m]=k.split("-"); const n=["","Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"]; return `${n[parseInt(m)]} ${y.slice(2)}`; };

  // Calcolo sanzioni economiche
  const calcolaSanzione = (record) => {
    // Sanzione manuale: ha precedenza assoluta
    if(record.importoSanzione && parseFloat(record.importoSanzione) > 0)
      return parseFloat(record.importoSanzione);
    let tot = 0;
    const vociRecord = [...(record.violazioniRiscontrate||[]), ...(record.motivoControllo||[])];

    // Estrae le parole chiave significative da una stringa (ignora negazioni e parole vuote)
    const keywords = str => str.toLowerCase()
      .replace(/\b(mancante|mancanza|assenza|senza|no|non|di|del|della|il|la|lo|e|è|in|per|da|con|su)\b/g," ")
      .split(/\s+/).map(s=>s.trim()).filter(s=>s.length>=3);

    vociRecord.forEach(voce => {
      const voceLow = voce.toLowerCase();
      const match = tariffario.find(t => {
        const tLow = t.voce.toLowerCase();
        // Match diretto
        if(voceLow.includes(tLow) || tLow.includes(voceLow)) return true;
        // Match per parole chiave: almeno 1 keyword significativa in comune
        const kwVoce = keywords(voceLow);
        const kwTarif = keywords(tLow);
        return kwTarif.some(k => kwVoce.some(v => v.includes(k) || k.includes(v)));
      });
      if(match) tot += match.importo;
    });
    // Sanzione manuale aggiuntiva (sovrascrive il calcolo automatico se presente)
    return tot;
  };
  const totSanzioni = records.reduce((s,r)=>s+calcolaSanzione(r),0);
  const recordConSanzione = records.filter(r=>calcolaSanzione(r)>0);
  const topSanzioni = [...records].map(r=>({...r,_sanzione:calcolaSanzione(r)})).filter(r=>r._sanzione>0).sort((a,b)=>b._sanzione-a._sanzione).slice(0,8);

  // ── Editing inline sanzioni ──
  const [editingId, setEditingId] = React.useState(null);
  const [editVal,   setEditVal]   = React.useState("");
  const [savingId,  setSavingId]  = React.useState(null);

  const startEdit = (r) => {
    setEditingId(r.id);
    setEditVal(r.importoSanzione ? String(r.importoSanzione) : String(r._sanzione || ""));
  };
  const cancelEdit = () => { setEditingId(null); setEditVal(""); };

  const saveEdit = async (r) => {
    if(!db) return;
    const val = parseFloat(editVal);
    if(isNaN(val) || val < 0) return;
    setSavingId(r.id);
    try {
      await db.collection(COLL).doc(r.id).update({
        importoSanzione: val,
        modificatoDa: operatore?.nome || "—",
        modificatoIl: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(e){ console.error(e); }
    setSavingId(null); setEditingId(null); setEditVal("");
  };

  const resetSanzione = async (r) => {
    if(!db || !window.confirm(`Ripristinare il calcolo automatico per "${r.nomeEsercizio}"?`)) return;
    setSavingId(r.id);
    try {
      await db.collection(COLL).doc(r.id).update({
        importoSanzione: firebase.firestore.FieldValue.delete(),
        modificatoDa: operatore?.nome || "—",
        modificatoIl: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(e){ console.error(e); }
    setSavingId(null);
  };

  return (
    <div className="no-print stats-view-wrap" style={{padding:"0 24px 48px"}}>
      {/* Header statistiche con bottone tariffario */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--text-2)",letterSpacing:"0.06em"}}>Dati aggiornati in tempo reale · {records.length} record analizzati</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onExportPDF} style={{background:"var(--accent)",color:"#0c0e14",fontSize:12,fontWeight:700,padding:"6px 14px",borderRadius:7,cursor:"pointer",display:"flex",alignItems:"center",gap:6,border:"none"}}>
            🖨️ Esporta report PDF
          </button>
          <button onClick={onOpenTariffario} style={{background:"none",border:"1px solid #c9a84c50",color:"var(--accent)",fontSize:12,fontWeight:600,padding:"6px 14px",borderRadius:7,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            ⚙️ Tariffario sanzioni
          </button>
        </div>
      </div>

      {/* KPI principali */}
      <div className="stats-kpi-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:12}}>
        {[
          {label:"Totale controlli",value:records.length,color:"var(--accent)",icon:"📋"},
          {label:"Esercizi unici",value:Object.keys(perEsercizio).length,color:"var(--blue)",icon:"🏪"},
          {label:"% controlli con violazioni",value:`${percViolazioni}%`,color:"var(--orange)",icon:"⚠️"},
        ].map(s=>(
          <div key={s.label} style={{background:"rgba(10,14,22,0.82)",border:"0.5px solid rgba(255,255,255,0.14)",borderRadius:10,padding:"16px 18px"}}>
            <div style={{fontSize:18,marginBottom:6}}>{s.icon}</div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:28,fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:11,color:"var(--text-2)",marginTop:5,lineHeight:1.4}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* KPI sanzioni — in evidenza */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
        <div style={{background:"linear-gradient(135deg,#1e2a1a,#181c27)",border:"2px solid #52b78840",borderRadius:10,padding:"18px 20px",gridColumn:"1/3"}}>
          <div style={{fontSize:11,color:"var(--green)",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:6}}>💰 Totale sanzioni elevate</div>
          <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:36,fontWeight:700,color:"var(--green)",lineHeight:1}}>{fmtEuro(totSanzioni)}</div>
          <div style={{fontSize:12,color:"var(--text-2)",marginTop:6}}>su {recordConSanzione.length} controlli con importo calcolato</div>
        </div>
        <div style={{background:"rgba(10,14,22,0.82)",border:"0.5px solid rgba(255,255,255,0.14)",borderRadius:10,padding:"16px 18px"}}>
          <div style={{fontSize:18,marginBottom:6}}>🚨</div>
          <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:28,fontWeight:700,color:"var(--red)",lineHeight:1}}>{totViolazioni}</div>
          <div style={{fontSize:11,color:"var(--text-2)",marginTop:5,lineHeight:1.4}}>Violazioni totali riscontrate</div>
        </div>
      </div>

      <div className="stats-two-col" style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:14,marginBottom:14}}>
        <Card title="📅 Controlli per mese">
          {mesiSorted.length===0?<span style={{fontSize:13,color:"var(--text-2)"}}>Nessun dato</span>
          :<div style={{overflowX:"auto"}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,minHeight:140,paddingBottom:22,minWidth:mesiSorted.length*48}}>
              {mesiSorted.map(([k,v])=>(
                <div key={k} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:1,minWidth:40}}>
                  <div style={{fontSize:11,color:"var(--accent)",fontWeight:600}}>{v}</div>
                  <div style={{width:"100%",background:"linear-gradient(180deg,#c9a84c,#8a6f2e)",borderRadius:"4px 4px 0 0",height:`${Math.round(v/maxMese*100)}px`,minHeight:4}}></div>
                  <div style={{fontSize:10,color:"var(--text-2)",textAlign:"center",whiteSpace:"nowrap",transform:"rotate(-30deg)",transformOrigin:"top center",marginTop:4}}>{mesiLabel(k)}</div>
                </div>
              ))}
            </div>
          </div>}
        </Card>

        <Card title="⚖️ Provvedimenti adottati">
          {provList.map(([p,n])=>{
            const col=provColors[p]||"#7a859e";
            const pct=Math.round(n/records.length*100);
            return (
              <div key={p} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                  <span style={{color:"var(--text-1)"}}>{p}</span>
                  <span style={{color:col,fontWeight:600}}>{n} <span style={{color:"var(--text-2)",fontWeight:400,fontSize:11}}>({pct}%)</span></span>
                </div>
                <div style={{height:6,background:"var(--bg)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:3}}></div>
                </div>
              </div>
            );
          })}
        </Card>
      </div>

      <div className="stats-two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Card title="🏪 Top 10 esercizi per numero di interventi">
          {topEsercizi.map(([nome,n],i)=>(
            <BarRow key={nome} label={`${i+1}. ${nome}`} value={n} max={maxEsercizio} color="#7eb8f7"/>
          ))}
        </Card>
        <Card title="🏷️ Distribuzione tipologia attività">
          {tipoList.map(([tipo,n])=>(
            <BarRow key={tipo} label={tipo} value={n} max={maxTipo} color="#52b788"/>
          ))}
        </Card>
      </div>

      {/* Top sanzioni per esercizio */}
      {topSanzioni.length>0&&(
        <div style={{marginBottom:14}}>
          <Card title="💰 Top sanzioni per esercizio">
            <div style={{fontSize:11,color:"var(--text-2)",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
              <span style={{opacity:.7}}>ℹ️</span>
              Clicca ✏️ su una riga per correggere manualmente l'importo. L'importo manuale sovrascrive il calcolo automatico.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {topSanzioni.map((r,i)=>{
                const isEditing = editingId === r.id;
                const isSaving  = savingId  === r.id;
                const isManualeGia = r.importoSanzione && parseFloat(r.importoSanzione) > 0;
                return (
                  <div key={r.id} style={{
                    padding:"10px 12px",
                    borderRadius:8,
                    marginBottom:4,
                    background: isEditing ? "var(--surface-3)" : "transparent",
                    transition:"background .15s"
                  }}>
                    {/* Riga principale */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
                      {/* Info esercizio */}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:11,color:"var(--text-3)",fontWeight:600,flexShrink:0}}>{i+1}.</span>
                          <span style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nomeEsercizio}</span>
                          {isManualeGia&&(
                            <span title="Importo corretto manualmente" style={{fontSize:9,background:"rgba(82,183,136,.15)",color:"var(--green)",borderRadius:4,padding:"1px 6px",flexShrink:0,fontWeight:600}}>MANUALE</span>
                          )}
                        </div>
                        <div style={{fontSize:11,color:"var(--text-2)",marginTop:2,paddingLeft:18}}>{fmt(r.data)} {r.indirizzo&&`· ${r.indirizzo}`}</div>
                      </div>

                      {/* Importo + pulsanti */}
                      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                        {!isEditing && (
                          <>
                            <span style={{color:"var(--green)",fontWeight:700,fontSize:14}}>{fmtEuro(r._sanzione)}</span>
                            {db&&<button
                              onClick={()=>startEdit(r)}
                              title="Correggi importo manualmente"
                              style={{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"3px 6px",borderRadius:6,color:"var(--text-3)",transition:"all .15s"}}
                              onMouseEnter={e=>{e.currentTarget.style.background="var(--surface-3)";e.currentTarget.style.color="var(--accent)"}}
                              onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="var(--text-3)"}}>✏️</button>}
                            {db&&isManualeGia&&<button
                              onClick={()=>resetSanzione(r)}
                              title="Ripristina calcolo automatico"
                              style={{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:"3px 6px",borderRadius:6,color:"var(--text-3)",transition:"all .15s"}}
                              onMouseEnter={e=>{e.currentTarget.style.background="rgba(224,82,82,.1)";e.currentTarget.style.color="var(--red)"}}
                              onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="var(--text-3)"}}>↺</button>}
                          </>
                        )}
                        {isEditing&&(
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{position:"relative"}}>
                              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"var(--text-3)"}}>€</span>
                              <input
                                type="number"
                                value={editVal}
                                onChange={e=>setEditVal(e.target.value)}
                                onKeyDown={e=>{ if(e.key==="Enter") saveEdit(r); if(e.key==="Escape") cancelEdit(); }}
                                autoFocus
                                style={{...INP,width:130,paddingLeft:22,fontSize:13,textAlign:"right"}}
                                min="0" step="0.01"
                              />
                            </div>
                            <button
                              onClick={()=>saveEdit(r)}
                              disabled={isSaving}
                              style={{background:"var(--green)",color:"#0c0e14",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",minWidth:64}}>
                              {isSaving?"⏳":"✓ Salva"}
                            </button>
                            <button
                              onClick={cancelEdit}
                              style={{background:"none",border:"none",color:"var(--text-3)",fontSize:12,padding:"7px 10px",borderRadius:7,cursor:"pointer"}}>
                              ✕
                            </button>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Barra proporzione */}
                    {!isEditing&&(
                      <div style={{marginTop:6,paddingLeft:18}}>
                        <div style={{height:3,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${Math.round(r._sanzione/topSanzioni[0]._sanzione*100)}%`,background:"var(--green)",borderRadius:2,transition:"width .3s"}}/>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      <div className="stats-three-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
        <Card title="🚨 Violazioni riscontrate più frequenti">
          {topViol.length===0
            ?<span style={{fontSize:13,color:"var(--text-2)"}}>Nessuna violazione registrata</span>
            :topViol.map(([v,n])=>{ const c=violColor(v); return <BarRow key={v} label={v} value={n} max={maxViol} color={c.fg}/>; })
          }
        </Card>
        <Card title="⚠️ Motivi di controllo più frequenti">
          {topMotivi.length===0
            ?<span style={{fontSize:13,color:"var(--text-2)"}}>Nessun motivo registrato</span>
            :topMotivi.map(([m,n])=><BarRow key={m} label={m} value={n} max={maxMotivo} color="#c9a84c"/>)
          }
        </Card>
        <Card title="👮 Agenti più attivi">
          {topAgenti.length===0
            ?<span style={{fontSize:13,color:"var(--text-2)"}}>Nessun agente registrato</span>
            :topAgenti.map(([a,n])=>(
              <div key={a} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:hCol(a),color:"#0c0e14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{ini(a)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a}</span>
                    <span style={{color:"var(--purple)",fontWeight:600,flexShrink:0,marginLeft:6}}>{n}</span>
                  </div>
                  <div style={{height:5,background:"var(--bg)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.round(n/maxAgente*100)}%`,background:"#b07af7",borderRadius:3}}></div>
                  </div>
                </div>
              </div>
            ))
          }
        </Card>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("loading");
  const [operatore,setOperatore]=useState(null);
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("lista");
  const [tariffario,setTariffario]=useState(()=>{
    try{ const s=localStorage.getItem(TARIFFARIO_KEY); return s?JSON.parse(s):DEFAULT_TARIFFARIO; }
    catch(_){ return DEFAULT_TARIFFARIO; }
  });
  const [showTariffario,setShowTariffario]=useState(false);
  const saveTariffario=t=>{ setTariffario(t); localStorage.setItem(TARIFFARIO_KEY,JSON.stringify(t)); };
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [editing,setEditing]=useState(null);
  const [detail,setDetail]=useState(null);
  const [scheda,setScheda]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [search,setSearch]=useState("");
  const [searchSchede,setSearchSchede]=useState("");
  const [filterProv,setFilterProv]=useState("");
  const [filterTag,setFilterTag]=useState("");
  const [filterTipo,setFilterTipo]=useState(""); // 'commerciale' | 'ricettiva' | ''
  const [sortBy,setSortBy]=useState("data");
  const [sortDir,setSortDir]=useState("desc");
  const dbRef=useRef(null);

  useEffect(()=>{
    const op=sessionStorage.getItem(OP_KEY);
    // Usa config salvata in localStorage (se esiste) oppure quella incorporata
    let cfg = null;
    const savedCfg = localStorage.getItem(CFG_KEY);
    if(savedCfg){ try{ cfg=JSON.parse(savedCfg); }catch(_){} }
    if(!cfg){ cfg=EMBEDDED_CFG; localStorage.setItem(CFG_KEY,JSON.stringify(cfg)); }
    try{
      try{firebase.app();}catch(_){firebase.initializeApp(cfg);}
      dbRef.current=firebase.firestore();
      if(op){ setOperatore(JSON.parse(op)); setPhase("app"); }
      else setPhase("login");
    }catch(_){ setPhase("setup"); }
  },[]);

  useEffect(()=>{
    if(phase!=="app"||!dbRef.current) return;
    setLoading(true);
    const unsub=dbRef.current.collection(COLL).orderBy("creatoIl","desc").onSnapshot(snap=>{setRecords(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);},()=>setLoading(false));
    return ()=>unsub();
  },[phase]);

  const handleSetup=cfg=>{ try{firebase.app();}catch(_){firebase.initializeApp(cfg);} dbRef.current=firebase.firestore(); setPhase("login"); };
  const handleLogin=(nome,matricola)=>{ const op={nome,matricola}; sessionStorage.setItem(OP_KEY,JSON.stringify(op)); setOperatore(op); setPhase("app"); setTimeout(()=>{ if(dbRef.current) dbRef.current.collection(COLL_LOG).add({azione:"login",dettaglio:"Accesso effettuato",operatore:nome,matricola:matricola||"",timestamp:firebase.firestore.FieldValue.serverTimestamp()}); },500); };
  const [showOperatori,setShowOperatori]=useState(false);
  const [showLog,setShowLog]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [showBulkProv,setShowBulkProv]=useState(false);
  const [showBulkAgenti,setShowBulkAgenti]=useState(false);
  const [multiEditing,setMultiEditing]=useState(null); // array of records for multi-edit
  const [showCorrector,setShowCorrector]=useState(false);
  const [showCorrectorComm,setShowCorrectorComm]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [confirmDeleteAll,setConfirmDeleteAll]=useState(false);
  const isMobile = typeof window!=="undefined" && window.innerWidth<=768;

  // ── Selection helpers ──
  const toggleSelect = id => setSelectedIds(prev => { const n=new Set(prev); if(n.has(id)) n.delete(id); else n.add(id); return n; });
  const selectAll = () => { if(selectedIds.size===sortedFilteredRef.length) setSelectedIds(new Set()); else setSelectedIds(new Set(sortedFilteredRef.map(r=>r.id))); };
  const clearSelection = () => setSelectedIds(new Set());
  const selectedRecords = records.filter(r=>selectedIds.has(r.id));
  // We'll store sortedFiltered in a ref-like variable for selectAll
  let sortedFilteredRef = [];

  // Funzione di logging centralizzata
  const logAzione = React.useCallback(async (azione, dettaglio="") => {
    if(!dbRef.current || !operatore) return;
    try {
      await dbRef.current.collection(COLL_LOG).add({
        azione, dettaglio,
        operatore: operatore.nome,
        matricola: operatore.matricola||"",
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch(_){}
  },[operatore]);

  const handleSave=async f=>{
    const now=firebase.firestore.FieldValue.serverTimestamp();
    if(editing){
      await dbRef.current.collection(COLL).doc(editing.id).update({...f,modificatoDa:operatore.nome,modificatoIl:now});
      logAzione("modifica",`Modificato: ${f.nomeEsercizio} — ${fmt(f.data)}`);
      setEditing(null);
    } else {
      await dbRef.current.collection(COLL).add({...f,creatoDA:operatore.nome,creatoMatricola:operatore.matricola||"",creatoIl:now});
      logAzione("inserimento",`Inserito: ${f.nomeEsercizio} — ${fmt(f.data)}`);
    }
    setShowAdd(false);
  };

  const handleImport=async rows=>{
    const now=firebase.firestore.FieldValue.serverTimestamp();
    const batch=dbRef.current.batch();
    rows.forEach(r=>{
      const {_agenti,...rest}=r;
      const ref=dbRef.current.collection(COLL).doc();
      batch.set(ref,{...rest,_agenti:_agenti||"",creatoDA:operatore.nome,creatoMatricola:operatore.matricola||"",creatoIl:now});
    });
    await batch.commit();
    logAzione("importazione",`Importati ${rows.length} record da file Excel`);
  };

  const handleDelete=async id=>{ const r=records.find(x=>x.id===id); await dbRef.current.collection(COLL).doc(id).delete(); logAzione("eliminazione",`Eliminato: ${r?.nomeEsercizio||"—"} — ${fmt(r?.data)}`); setConfirm(null); };

  // ── Bulk action handlers ──
  const handleBulkProv = async (provObj) => {
    const now=firebase.firestore.FieldValue.serverTimestamp();
    const batch=dbRef.current.batch();
    selectedIds.forEach(id=>{
      const ref=dbRef.current.collection(COLL).doc(id);
      batch.update(ref,{provvedimenti:[provObj],provvedimento:provObj.tipo,modificatoDa:operatore.nome,modificatoIl:now});
    });
    await batch.commit();
    logAzione("modifica",`Provvedimento di massa (${provObj.tipo}) su ${selectedIds.size} record`);
    clearSelection();
    setShowBulkProv(false);
  };

  const handleBulkAgenti = async (agenti) => {
    const now=firebase.firestore.FieldValue.serverTimestamp();
    const batch=dbRef.current.batch();
    selectedIds.forEach(id=>{
      const ref=dbRef.current.collection(COLL).doc(id);
      batch.update(ref,{agentiOp:agenti,modificatoDa:operatore.nome,modificatoIl:now});
    });
    await batch.commit();
    logAzione("modifica",`Agenti assegnati di massa (${agenti.join(", ")}) su ${selectedIds.size} record`);
    clearSelection();
    setShowBulkAgenti(false);
  };

  const handleMultiEditSave = async (record) => {
    const now=firebase.firestore.FieldValue.serverTimestamp();
    await dbRef.current.collection(COLL).doc(record.id).update({...record,modificatoDa:operatore.nome,modificatoIl:now});
    logAzione("modifica",`Modificato (multi-edit): ${record.nomeEsercizio} — ${fmt(record.data)}`);
  };

  const handleDeleteAll = async () => {
    const snap = await dbRef.current.collection(COLL).get();
    const total = snap.size;
    for(let i=0; i<snap.docs.length; i+=450){
      const batch = dbRef.current.batch();
      snap.docs.slice(i, i+450).forEach(d => batch.delete(d.ref));
      await batch.commit();
    }
    logAzione("eliminazione",`Eliminazione totale: ${total} record cancellati`);
    setConfirmDeleteAll(false);
  };

  const gruppi=records.reduce((acc,r)=>{
    const key=(r.nomeEsercizio||"").trim().toLowerCase(); if(!key) return acc;
    if(!acc[key]) acc[key]={nomeEsercizio:r.nomeEsercizio,indirizzo:r.indirizzo,titolare:r.titolare,piva:r.piva,tipo:r.tipo,interventi:[]};
    acc[key].interventi.push(r); return acc;
  },{});
  // Ordina gli interventi di ogni gruppo per data discendente (più recente prima)
  Object.values(gruppi).forEach(g => {
    g.interventi.sort((a,b) => {
      const da = a.data ? new Date(a.data).getTime() : 0;
      const db2= b.data ? new Date(b.data).getTime() : 0;
      if(da !== db2) return db2 - da;
      const getTs = r => r.creatoIl?.toDate ? r.creatoIl.toDate().getTime() : r.creatoIl ? new Date(r.creatoIl).getTime() : 0;
      return getTs(b) - getTs(a);
    });
  });
  const gruppiList=Object.values(gruppi).sort((a,b)=>b.interventi.length-a.interventi.length);
  const gruppiFiltered = searchSchede.trim()
    ? gruppiList.filter(g => {
        const q = searchSchede.trim().toLowerCase();
        return [g.nomeEsercizio||"", g.indirizzo||"", g.titolare||"", g.tipo||""]
          .some(s => s.toLowerCase().includes(q));
      })
    : gruppiList;

  const filtered=records.filter(r=>{
    const q=search.toLowerCase();
    const mq=!q||(()=>{
      const ags=Array.isArray(r.agentiOp)?r.agentiOp.join(" "):(r.agentiOp||r._agenti||"");
      return [r.nomeEsercizio,r.indirizzo,r.legaleRappresentante||r.titolare||"",r.ragioneSociale||"",r.tipo||"",r.tipoAttivita||"",r.creatoDA||"",ags].some(s=>s.toLowerCase().includes(q));
    })();
    const mp=!filterProv||r.provvedimento===filterProv;
    const mt=!filterTag||(()=>{ const cat=CATEGORIE_TAG.find(c=>c.id===filterTag); return cat?recordInCategoria(r,cat):true; })();
    const mTipo=!filterTipo||(filterTipo==='commerciale'?r.tipoAttivita==="Attività Commerciale":r.tipoAttivita==="Attività Ricettiva Extralberghiera");
    return mq&&mp&&mt&&mTipo;
  });

  // Ordinamento
  const sortedFiltered = [...filtered].sort((a,b)=>{
    let va,vb;
    if(sortBy==="data"){
      // Confronto per data ISO (YYYY-MM-DD) + fallback timestamp inserimento
      const da = a.data ? new Date(a.data).getTime() : 0;
      const db2= b.data ? new Date(b.data).getTime() : 0;
      if(da!==db2) return sortDir==="asc" ? da-db2 : db2-da;
      // Stessa data → tiebreaker immediato su creatoIl
      const getTs2 = r => r.creatoIl?.toDate ? r.creatoIl.toDate().getTime() : r.creatoIl ? new Date(r.creatoIl).getTime() : 0;
      return getTs2(b) - getTs2(a);
    }
    if(false)                  { va=""; vb=""; } // placeholder per else-if chain
    else if(sortBy==="nome")  { va=(a.nomeEsercizio||"").toLowerCase(); vb=(b.nomeEsercizio||"").toLowerCase(); }
    else if(sortBy==="titolare"){ va=(a.titolare||"").toLowerCase(); vb=(b.titolare||"").toLowerCase(); }
    else if(sortBy==="provvedimento"){ va=(a.provvedimento||"").toLowerCase(); vb=(b.provvedimento||"").toLowerCase(); }
    else if(sortBy==="tipo_att"){ va=(a.tipoAttivita||"").toLowerCase(); vb=(b.tipoAttivita||"").toLowerCase(); }
    else if(sortBy==="violazioni"){ va=a.violazioniRiscontrate?.length||0; vb=b.violazioniRiscontrate?.length||0; }
    else { va=""; vb=""; }
    if(va<vb) return sortDir==="asc"?-1:1;
    if(va>vb) return sortDir==="asc"?1:-1;
    // Tiebreaker: stessa data → ordina per timestamp preciso di inserimento (più recente prima)
    const getTs = r => r.creatoIl?.toDate ? r.creatoIl.toDate().getTime()
                     : r.creatoIl          ? new Date(r.creatoIl).getTime()
                     : 0;
    return getTs(b) - getTs(a);
  });
  sortedFilteredRef = sortedFiltered;

  const toggleSort = col => {
    if(sortBy===col) {
      setSortDir(d=>d==="asc"?"desc":"asc");
    } else {
      setSortBy(col);
      // Data e violazioni: default discendente (più recente / più grave prima)
      setSortDir(col==="data"||col==="violazioni" ? "desc" : "asc");
    }
  };

  const SortIcon = ({col}) => {
    if(sortBy!==col) return <span style={{color:"#3a4a6a",marginLeft:3}}>⇅</span>;
    return <span style={{color:"var(--accent)",marginLeft:3}}>{sortDir==="asc"?"↑":"↓"}</span>;
  };

  const totViol=records.reduce((s,r)=>s+(r.motivoControllo?.length||0),0);
  const denunce=records.filter(r=>r.provvedimento?.toLowerCase().includes("denuncia")).length;
  const cut=new Date(); cut.setMonth(cut.getMonth()-1);
  const ultimoMese=records.filter(r=>r.data&&new Date(r.data)>=cut).length;

  if(phase==="loading") return <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-2)"}}>⏳ Caricamento…</div>;
  if(phase==="setup")   return <SetupScreen onSave={handleSetup}/>;
  if(phase==="login")   return <LoginScreen onLogin={handleLogin} db={dbRef.current}/>;

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text-1)",position:"relative",overflow:"hidden"}}>
      {/* Ambient glow blobs */}
      <div className="glow-blob" style={{top:"-100px",left:"-80px",width:"320px",height:"320px",background:"radial-gradient(circle,rgba(126,184,247,0.09) 0%,transparent 70%)"}}></div>
      <div className="glow-blob" style={{top:"60px",right:"-100px",width:"380px",height:"380px",background:"radial-gradient(circle,rgba(226,201,126,0.07) 0%,transparent 70%)"}}></div>
      <div className="glow-blob" style={{bottom:"200px",left:"35%",width:"260px",height:"260px",background:"radial-gradient(circle,rgba(82,214,138,0.05) 0%,transparent 70%)"}}></div>
      {/* HEADER */}
      <header className="no-print" style={{
        background:"rgba(8,11,18,0.72)",
        backdropFilter:"blur(32px) saturate(200%)",
        WebkitBackdropFilter:"blur(32px) saturate(200%)",
        borderBottom:"0.5px solid rgba(255,255,255,0.08)",
        padding:"0 28px",
        position:"sticky",top:0,zIndex:50,overflow:"visible",
        boxShadow:"0 1px 0 rgba(255,255,255,0.06)"
      }}>

        {/* ── BARRA TOP ── */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>

          {/* Sinistra: logo + stato */}
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            {/* Badge UO */}
            <div style={{
              fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",
              color:"var(--blue)",padding:"4px 12px",borderRadius:6,
              background:"rgba(126,184,247,0.08)",
              border:"1px solid rgba(126,184,247,0.18)",
            }}>
              U.O. San Lorenzo — Polizia Amministrativa
            </div>
            {/* Pallino online */}
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"var(--green)",boxShadow:"0 0 6px var(--green)",animation:"pulse 2.5s infinite"}}/>
              <span style={{fontSize:11,color:"var(--green)",fontWeight:500,letterSpacing:"0.05em"}}>LIVE</span>
            </div>
          </div>

          {/* Destra: avatar + menu azioni */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {/* Chip operatore */}
            <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.07)",border:"0.5px solid rgba(255,255,255,0.14)",borderRadius:999,padding:"4px 14px 4px 5px",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",position:"relative",overflow:"hidden",boxShadow:"inset 0 1px 0 rgba(255,255,255,0.15)"}}>
              <Avatar name={operatore.nome} size={24}/>
              <span style={{fontSize:13,color:"var(--text-1)",fontWeight:500}}>{operatore.nome}</span>
              {operatore.matricola&&<span style={{fontSize:12,color:"var(--text-3)"}}>· {operatore.matricola}</span>}
            </div>

            {/* Bottoni desktop — icone pulite, no bordi */}
            <div className="desktop-only" style={{display:"flex",gap:4}}>
              <button className="hdr-btn" onClick={()=>setShowLog(true)} title="Log attività">📋</button>
              <button className="hdr-btn" onClick={()=>setShowOperatori(true)} title="Gestione accessi">🔐</button>
              <button className="hdr-btn" onClick={()=>{localStorage.removeItem(CFG_KEY);window.location.reload();}} title="Cambia database">⚙️</button>
              <button className="hdr-btn danger" onClick={()=>setConfirmDeleteAll(true)} title="Elimina tutti i dati">🗑️</button>
              <div style={{width:"0.5px",height:18,background:"rgba(255,255,255,0.1)",margin:"0 6px",alignSelf:"center"}}/>
              <button style={{background:"none",border:"none",color:"var(--text-3)",fontSize:12,cursor:"pointer",padding:"4px 8px",borderRadius:7}} onClick={()=>{sessionStorage.removeItem(OP_KEY);setOperatore(null);setPhase("login");}}>Esci</button>
            </div>

            {/* Hamburger mobile */}
            <button className="mobile-only" onClick={()=>setMenuOpen(o=>!o)}
              style={{background:"rgba(255,255,255,0.04)",border:"none",color:"var(--text-1)",fontSize:18,padding:"6px 10px",borderRadius:"var(--radius-sm)",cursor:"pointer",display:"none",boxShadow:"var(--shadow-sm)"}}>
              ☰
            </button>
          </div>

          {/* Dropdown mobile */}
          {menuOpen&&(
            <div className="mobile-only" style={{display:"none",position:"absolute",top:56,right:16,background:"rgba(255,255,255,0.05)",borderRadius:12,padding:6,zIndex:200,minWidth:210,boxShadow:"var(--shadow-lg)",border:"1px solid var(--rim)"}}>
              {[
                {icon:"🚪",label:"Esci", action:()=>{sessionStorage.removeItem(OP_KEY);setOperatore(null);setPhase("login");setMenuOpen(false);}},
                {icon:"📋",label:"Log attività", action:()=>{setShowLog(true);setMenuOpen(false);}},
                {icon:"🔐",label:"Gestione accessi", action:()=>{setShowOperatori(true);setMenuOpen(false);}},
                {icon:"⚙️",label:"Cambia database", action:()=>{localStorage.removeItem(CFG_KEY);window.location.reload();}},
                {icon:"🗑️",label:"Elimina tutti i dati", action:()=>{setConfirmDeleteAll(true);setMenuOpen(false);}},
              ].map(({icon,label,action})=>(
                <button key={label} onClick={action} style={{width:"100%",background:"none",border:"none",color:"var(--text-1)",fontSize:13,padding:"10px 14px",borderRadius:8,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,transition:"background .1s"}}>
                  <span>{icon}</span><span>{label}</span>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* ── TITOLO + FILTRI TIPO ── */}
        <div style={{paddingTop:14,paddingBottom:16,display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{display:"flex",alignItems:"baseline",flexWrap:"wrap",lineHeight:1.1,gap:8}}>
              <span style={{fontSize:28,fontWeight:700,color:"var(--text-1)",letterSpacing:"-0.03em",fontFamily:"'Crimson Pro',Georgia,serif"}}>Registro Controlli</span>
              <span style={{fontSize:28,fontWeight:700,color:"var(--accent)",letterSpacing:"-0.03em",fontFamily:"'Crimson Pro',Georgia,serif"}}>Commerciali</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
              <span style={{fontSize:12,color:"var(--text-3)"}}>Multi-utente · Tempo reale</span>
              <span style={{width:3,height:3,borderRadius:"50%",background:"var(--text-3)",display:"inline-block"}}/>
              <span style={{fontSize:12,color:"var(--text-2)",fontWeight:500}}>{records.length} record</span>
            </div>
          </div>

          {/* Chip filtro tipologia */}
          <div className="header-chips" style={{display:"flex",gap:8,alignItems:"center"}}>
            {[
              {key:"commerciale", label:"Commerciale",  icon:"🏪", match:"Attività Commerciale",              color:"var(--accent)",   bg:"rgba(226,201,126,0.08)",  border:"rgba(226,201,126,0.2)"},
              {key:"ricettiva",   label:"Ricettiva",    icon:"🏠", match:"Attività Ricettiva Extralberghiera", color:"var(--blue)",    bg:"rgba(126,184,247,0.08)", border:"rgba(126,184,247,0.2)"},
            ].map(({key,label,icon,match,color,bg,border})=>{
              const n=records.filter(r=>r.tipoAttivita===match).length;
              const active=filterTipo===key;
              return (
                <button key={key} onClick={()=>setFilterTipo(active?"":key)} style={{
                  background: active?bg:"rgba(255,255,255,0.05)",
                  border:`0.5px solid ${active?border:"rgba(255,255,255,0.1)"}`,
                  borderRadius:999,
                  padding:"6px 16px",
                  cursor:"pointer",
                  display:"flex",alignItems:"center",gap:8,
                  backdropFilter:"blur(16px)",
                  WebkitBackdropFilter:"blur(16px)",
                  boxShadow:active?"inset 0 1px 0 rgba(255,255,255,0.2)":"inset 0 1px 0 rgba(255,255,255,0.08)",
                  transition:"all .2s",
                }}>
                  <span style={{fontSize:15}}>{icon}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:active?color:"var(--text-2)",letterSpacing:"0.05em"}}>{label}</div>
                    <div style={{fontSize:13,fontWeight:700,color:active?color:"var(--text-3)",lineHeight:1}}>{n}</div>
                  </div>
                </button>
              );
            })}
            {filterTipo&&<button onClick={()=>setFilterTipo("")} style={{background:"none",border:"none",color:"var(--text-3)",cursor:"pointer",fontSize:12,padding:"4px 6px"}}>✕</button>}
          </div>
        </div>

        <style>{`
          @keyframes pulse {
            0%,100%{opacity:1;transform:scale(1)}
            50%{opacity:.6;transform:scale(1.3)}
          }
        `}</style>
      </header>

      {/* STATS */}
      <div className="no-print stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,padding:"20px 28px"}}>
        {[
          {label:"Controlli totali", value:records.length,  sub:"nel database",  color:"var(--accent)", icon:"📋"},
          {label:"Ultimo mese",      value:ultimoMese,       sub:"recenti",        color:"var(--blue)",   icon:"📅"},
          {label:"Violazioni",       value:totViol,          sub:"riscontrate",    color:"var(--red)",    icon:"⚠️"},
          {label:"Denunce",          value:denunce,          sub:"provvedimenti",  color:"var(--green)",  icon:"⚖️"},
        ].map(s=>(
          <div key={s.label} className="card" style={{padding:"18px 20px",animation:"fadeIn .3s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <span style={{fontSize:11,color:"var(--text-3)",fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase"}}>{s.label}</span>
              <span style={{fontSize:18,lineHeight:1}}>{s.icon}</span>
            </div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:34,fontWeight:700,lineHeight:1,color:s.color}}>{loading?"…":s.value}</div>
            <div style={{fontSize:12,color:"var(--text-3)",marginTop:6}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* TAB + TOOLBAR */}
      <div className="no-print toolbar-wrap" style={{padding:"0 28px 14px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        {/* Tab switcher — stile segmented control Apple */}
        <div style={{display:"flex",background:"rgba(0,0,0,0.35)",border:"0.5px solid rgba(255,255,255,0.1)",borderRadius:12,padding:3,gap:2,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",position:"relative",boxShadow:"inset 0 1px 0 rgba(255,255,255,0.05)"}}>
          {[["lista","📋 Lista"],["schede","🏪 Schede"],["stats","📊 Statistiche"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{
              background: view===v?"rgba(255,255,255,0.1)":"none",
              color: view===v?"var(--text-1)":"var(--text-3)",
              border:view===v?"0.5px solid rgba(255,255,255,0.18)":"none",
              borderRadius:9,padding:"7px 16px",
              fontSize:13,fontWeight:view===v?600:400,cursor:"pointer",whiteSpace:"nowrap",
              backdropFilter:view===v?"blur(10px)":"none",
              WebkitBackdropFilter:view===v?"blur(10px)":"none",
              boxShadow:view===v?"inset 0 1px 0 rgba(255,255,255,0.18)":"none",
              transition:"all .25s"
            }}>{l}</button>
          ))}
        </div>

        {view==="lista"&&<>
          <div style={{flex:1,minWidth:180,position:"relative"}}>
            <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"var(--text-3)",pointerEvents:"none",fontSize:15}}>🔍</span>
            <input placeholder="Cerca…" value={search} onChange={e=>setSearch(e.target.value)} style={{...INP,padding:"9px 12px 9px 36px"}}/>
          </div>
          <select value={filterProv} onChange={e=>setFilterProv(e.target.value)} style={{...INP,width:"auto",cursor:"pointer",padding:"9px 12px"}}>
            <option value="">Tutti i provvedimenti</option>
            {PROVVEDIMENTI.map(p=><option key={p}>{p}</option>)}
          </select>
          {records.length>0&&<button onClick={()=>{exportCSV(records);logAzione("export_csv",`Esportati ${records.length} record in CSV`);}} className="btn-glass" style={{whiteSpace:"nowrap",fontSize:12}}>⬇ CSV</button>}
          <button className="mobile-only" onClick={selectAll} style={{display:"none",background:selectedIds.size>0?"var(--surface-3)":"none",border:"none",color:selectedIds.size>0?"var(--accent)":"var(--text-3)",fontSize:12,padding:"9px 12px",borderRadius:"var(--radius-sm)",cursor:"pointer",whiteSpace:"nowrap",alignItems:"center",gap:4}}>
            ☑ {selectedIds.size>0?`${selectedIds.size} sel.`:"Seleziona"}
          </button>
        </>}

        <div className="toolbar-main-btns" style={{marginLeft:"auto",display:"flex",gap:6}}>
          {records.length>0&&<button onClick={()=>setShowCorrector(true)} className="btn-glass" style={{whiteSpace:"nowrap",color:"var(--orange)",borderColor:"rgba(247,176,122,0.25)",fontSize:13}}>🔧 Correttore dati</button>}
          {records.length>0&&<button onClick={()=>setShowCorrectorComm(true)} className="btn-glass" style={{whiteSpace:"nowrap",color:"var(--blue)",borderColor:"rgba(126,184,247,0.25)",fontSize:13}}>🏪 Correttore commerciali</button>}
          {records.length>0&&<button onClick={()=>setShowReport(true)} className="btn-tinted" style={{whiteSpace:"nowrap",fontSize:13}}>📄 Report PDF</button>}
          <button onClick={()=>setShowImport(true)} className="btn-glass" style={{whiteSpace:"nowrap",color:"var(--green)",borderColor:"rgba(82,214,138,0.25)"}}>⬆ Importa Excel</button>
          <button onClick={()=>setShowAdd(true)} className="btn-primary" style={{whiteSpace:"nowrap"}}>+ Nuovo controllo</button>
        </div>
      </div>

      {/* TAG FILTER BAR */}
      {view==="lista"&&records.length>0&&(
        <div className="no-print tag-bar" style={{padding:"0 28px 14px",overflowX:"auto"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:"var(--text-3)",flexShrink:0,marginRight:4,letterSpacing:"0.04em",textTransform:"uppercase"}}>Filtra:</span>
            <button onClick={()=>setFilterTag("")}
              style={{background:filterTag===""?"var(--accent)":"rgba(255,255,255,0.07)",color:filterTag===""?"#080B12":"var(--text-2)",border:`0.5px solid ${filterTag===""?"rgba(226,201,126,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:999,padding:"5px 14px",fontSize:12,fontWeight:filterTag===""?600:400,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",boxShadow:filterTag===""?"inset 0 1px 0 rgba(255,255,255,0.3)":"inset 0 1px 0 rgba(255,255,255,0.08)"}}>
              Tutti ({records.length})
            </button>
            {CATEGORIE_TAG.map(cat=>{
              const count=records.filter(r=>recordInCategoria(r,cat)).length;
              if(count===0) return null;
              const active=filterTag===cat.id;
              return (
                <button key={cat.id} onClick={()=>{const next=active?"":cat.id;setFilterTag(next);if(next)logAzione("ricerca_tag",`Filtro tag: ${cat.label}`);}}
                  style={{background:active?cat.bg+"cc":"rgba(255,255,255,0.06)",color:active?cat.color:"var(--text-3)",border:`0.5px solid ${active?cat.color+"60":"rgba(255,255,255,0.1)"}`,borderRadius:999,padding:"5px 14px",fontSize:12,fontWeight:active?600:400,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",boxShadow:active?"inset 0 1px 0 rgba(255,255,255,0.2)":"inset 0 1px 0 rgba(255,255,255,0.06)"}}>
                  {cat.label} <span style={{opacity:.7}}>({count})</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* LISTA */}
      {view==="lista"&&(
        <div className="no-print lista-wrap" style={{padding:"0 24px 40px",overflowX:"auto"}}>
          {loading?<div style={{textAlign:"center",padding:"64px",color:"var(--text-2)"}}>⏳ Connessione…</div>
          :filtered.length===0?<div style={{textAlign:"center",padding:"64px 24px",color:"var(--text-2)"}}><div style={{fontSize:48,marginBottom:16}}>🗂</div><div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,color:"var(--text-1)"}}>{records.length===0?"Nessun controllo registrato":"Nessun risultato"}</div><div style={{fontSize:13,marginTop:6}}>{records.length===0?'Clicca "+ Nuovo controllo" o "Importa Excel"':"Modifica i filtri"}</div></div>
          :<>
            {/* MOBILE CARDS */}
            <div className="mobile-cards" style={{display:"none"}}>
              {sortedFiltered.map(r=>(
                <div key={r.id} onClick={()=>{setDetail(r);logAzione("consultazione",`Consultato: ${r.nomeEsercizio} — ${fmt(r.data)}`);}}
                  style={{background:selectedIds.has(r.id)?"rgba(126,184,247,.08)":"#181c27",border:`1px solid ${selectedIds.has(r.id)?"rgba(226,201,126,.3)":"#2a3049"}`,borderRadius:10,padding:"14px 16px",cursor:"pointer"}}>
                  {/* Checkbox row */}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}} onClick={e=>e.stopPropagation()}>
                    {<input type="checkbox" checked={selectedIds.has(r.id)} onChange={()=>toggleSelect(r.id)}
                      style={{width:16,height:16,accentColor:"#c9a84c",cursor:"pointer",flexShrink:0}}/>}
                    {<span style={{fontSize:10,color:"var(--text-2)",letterSpacing:"0.05em",textTransform:"uppercase"}}>Seleziona</span>}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nomeEsercizio}</div>
                      {r.tipoAttivita&&<div style={{fontSize:10,color:r.tipoAttivita.includes("Ricettiva")?"#7eb8f7":"#c9a84c",fontWeight:500,marginTop:1}}>{r.tipoAttivita.includes("Ricettiva")?"🏠":"🏪"} {r.tipoAttivita}</div>}
                      <div style={{fontSize:12,color:"var(--text-2)",marginTop:2}}>{r.indirizzo}</div>
                    </div>
                    {r.provvedimento&&<Badge label={r.provvedimento} fg={pCol(r.provvedimento)} bg={pBg(r.provvedimento)}/>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 14px",fontSize:12,marginBottom:8}}>
                    <div><span style={{color:"var(--text-2)"}}>Data: </span><span>{fmt(r.data)}{r.ora?` ${r.ora}`:""}</span></div>
                    <div><span style={{color:"var(--text-2)"}}>Titolare: </span><span>{r.titolare||"—"}</span></div>
                    {r.numeroVerbale&&<div><span style={{color:"var(--text-2)"}}>Verbale: </span><span style={{color:"var(--accent)"}}>{r.numeroVerbale}</span></div>}
                    {(()=>{
                    const ags=Array.isArray(r.agentiOp)?r.agentiOp:(r.agentiOp?r.agentiOp.split(",").map(s=>s.trim()).filter(Boolean):(r._agenti?r._agenti.split(",").map(s=>s.trim()).filter(Boolean):[]));
                    if(!ags.length) return <div><span style={{color:"var(--text-2)"}}>Agenti: </span><span style={{fontSize:11}}>{r.creatoDA||"—"}</span></div>;
                    return <div style={{gridColumn:"1/-1",display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}><span style={{color:"var(--text-2)",fontSize:11}}>Agenti:</span>{ags.map((a,i)=><span key={i} style={{background:hCol(a)+"30",color:hCol(a),border:`1px solid ${hCol(a)}60`,fontSize:10,padding:"2px 7px",borderRadius:999,fontWeight:600}}>{a}</span>)}</div>;
                  })()}
                  </div>
                  {r.violazioniRiscontrate?.length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                      {r.violazioniRiscontrate.map((v,i)=>{ const c=violColor(v); return <span key={i} style={{background:c.bg,color:c.fg,fontSize:10,padding:"2px 7px",borderRadius:999}}>{v}</span>; })}
                    </div>
                  )}
                  <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:10,paddingTop:8,borderTop:"1px solid var(--rim)"}}>
                    {<button onClick={e=>{e.stopPropagation();setEditing(r);}} style={{background:"none",border:"1px solid var(--rim)",color:"var(--accent)",fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer"}}>✏️ Modifica</button>}
                    {<button onClick={e=>{e.stopPropagation();setConfirm(r.id);}} style={{background:"none",border:"1px solid #5a1a1a",color:"var(--red)",fontSize:12,padding:"5px 12px",borderRadius:6,cursor:"pointer"}}>🗑</button>}
                  </div>
                </div>
              ))}
            </div>

            {/* DESKTOP TABLE */}
            <table className="desktop-table" style={{width:"100%",borderCollapse:"collapse",minWidth:820}}>
            <thead><tr style={{borderBottom:"0.5px solid rgba(255,255,255,0.07)"}}>
              <th style={{padding:"10px 8px",width:36}}>
                <input type="checkbox" checked={selectedIds.size>0&&selectedIds.size>=sortedFiltered.length} onChange={selectAll}
                  style={{width:15,height:15,accentColor:"var(--accent)",cursor:"pointer"}}/>
              </th>
              {[
                {label:"Data",         col:"data"},
                {label:"Tipologia",    col:"tipo_att"},
                {label:"Esercizio",    col:"nome"},
                {label:"Legale Rapp.", col:"titolare"},
                {label:"Motivo",       col:null},
                {label:"Violazioni",   col:"violazioni"},
                {label:"Provvedimento",col:"provvedimento"},
                {label:"Agenti/Op.",   col:null},
                {label:"",             col:null},
              ].map(({label,col},i)=>(
                <th key={i} onClick={col?()=>toggleSort(col):undefined}
                  style={{fontSize:11,fontWeight:500,color:sortBy===col?"var(--accent)":"var(--text-3)",letterSpacing:"0.06em",textTransform:"uppercase",padding:"10px 10px",textAlign:"left",cursor:col?"pointer":"default",userSelect:"none",whiteSpace:"nowrap"}}>
                  {label}{col&&<SortIcon col={col}/>}
                </th>
              ))}
            </tr></thead>
            <tbody>
              {sortedFiltered.map((r,ri)=>(
                <tr key={r.id} style={{borderBottom:"0.5px solid rgba(255,255,255,0.04)",cursor:"pointer",background:selectedIds.has(r.id)?"rgba(126,184,247,.08)":"transparent",transition:"background .12s"}}
                  onMouseEnter={e=>{if(!selectedIds.has(r.id))e.currentTarget.style.background="rgba(255,255,255,0.04)"}}
                  onMouseLeave={e=>{if(!selectedIds.has(r.id))e.currentTarget.style.background="transparent"}}>
                  <td style={{padding:"12px 8px"}} onClick={e=>e.stopPropagation()}>
                    <input type="checkbox" checked={selectedIds.has(r.id)} onChange={()=>toggleSelect(r.id)}
                      style={{width:15,height:15,accentColor:"var(--accent)",cursor:"pointer"}}/>
                  </td>
                  <td onClick={()=>{setDetail(r);logAzione("consultazione",`Consultato: ${r.nomeEsercizio} — ${fmt(r.data)}`);}} style={{padding:"12px 10px",fontSize:13,color:"var(--text-2)",whiteSpace:"nowrap"}}>{fmt(r.data)}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px"}}>
                    {r.tipoAttivita
                      ?<span style={{
                          background:r.tipoAttivita.includes("Ricettiva")?"rgba(126,184,247,.1)":"rgba(226,201,126,.1)",
                          color:r.tipoAttivita.includes("Ricettiva")?"var(--blue)":"var(--accent)",
                          fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:999,
                          whiteSpace:"nowrap"
                        }}>
                          {r.tipoAttivita.includes("Ricettiva")?"🏠 Ricettiva":"🏪 Commerciale"}
                        </span>
                      :<span style={{color:"var(--text-3)",fontSize:12}}>—</span>}
                  </td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px",fontSize:14,fontWeight:600,color:"var(--text-1)"}}>{r.nomeEsercizio}{r.tipo&&<div style={{fontSize:12,color:"var(--text-3)",fontWeight:400,marginTop:2}}>{r.tipo}</div>}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px",fontSize:13,color:"var(--text-2)"}}>{r.legaleRappresentante||r.titolare||"—"}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px",maxWidth:180}}>
                    {r.motivoControllo?.length
                      ? <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{r.motivoControllo.map((m,i)=><span key={i} style={{background:"rgba(226,201,126,.1)",color:"var(--accent)",fontSize:11,padding:"2px 9px",borderRadius:999,whiteSpace:"nowrap"}}>{m}</span>)}</div>
                      : <span style={{fontSize:12,color:"var(--text-3)"}}>—</span>}
                  </td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px",maxWidth:220}}>
                    {r.violazioniRiscontrate?.length
                      ? <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{r.violazioniRiscontrate.map((v,i)=>{ const c=violColor(v); return <span key={i} style={{background:c.bg,color:c.fg,fontSize:11,padding:"3px 10px",borderRadius:999,border:`0.5px solid ${c.fg}40`,backdropFilter:"blur(8px)",whiteSpace:"nowrap"}}>{v}</span>; })}</div>
                      : <span style={{fontSize:12,color:"var(--green)",fontWeight:500}}>✓ Nessuna</span>}
                  </td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px"}}>{(()=>{ const provs=r.provvedimenti?.length>0?r.provvedimenti.filter(p=>p.tipo||p):(r.provvedimento?[r.provvedimento]:[]); if(!provs.length) return <span style={{color:"var(--text-3)",fontSize:12}}>—</span>; return <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{provs.map((p,i)=>{ const t=typeof p==="string"?p:p.tipo; return t?<Badge key={i} label={t} fg={pCol(t)} bg={pBg(t)}/>:null; })}</div>; })()}</td>
                  <td onClick={()=>setDetail(r)} style={{padding:"12px 10px",maxWidth:200}}>
                    {(()=>{
                      const ags=Array.isArray(r.agentiOp)?r.agentiOp:(r.agentiOp?r.agentiOp.split(",").map(s=>s.trim()).filter(Boolean):(r._agenti?r._agenti.split(",").map(s=>s.trim()).filter(Boolean):[]));
                      if(!ags.length) return <span style={{fontSize:12,color:"var(--text-3)"}}>{r.creatoDA||"—"}</span>;
                      return <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{ags.map((a,i)=>(
                        <span key={i} style={{background:hCol(a)+"22",color:hCol(a),fontSize:11,padding:"2px 9px",borderRadius:999,fontWeight:600,whiteSpace:"nowrap"}}>{a}</span>
                      ))}</div>;
                    })()}
                  </td>
                  <td style={{padding:"12px 10px",whiteSpace:"nowrap"}}>
                    <button onClick={()=>setEditing(r)} className="hdr-btn" style={{fontSize:14,padding:"4px 6px"}}>✏️</button>
                    <button onClick={()=>setConfirm(r.id)} className="hdr-btn danger" style={{fontSize:14,padding:"4px 6px"}}>🗑</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table></>}
        </div>
      )}

      {/* SCHEDE */}
      {view==="schede"&&(
        <div className="no-print" style={{padding:"0"}}>
          {gruppiList.length>0&&(
            <div style={{padding:"0 28px 16px",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:200,maxWidth:440,position:"relative"}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text-3)",fontSize:14,pointerEvents:"none"}}>🔍</span>
                <input value={searchSchede} onChange={e=>setSearchSchede(e.target.value)}
                  placeholder="Cerca per nome, indirizzo, titolare…"
                  style={{...INP,paddingLeft:36}}/>
              </div>
              {searchSchede&&(
                <button onClick={()=>setSearchSchede("")}
                  style={{background:"none",border:"none",color:"var(--text-3)",fontSize:12,padding:"9px 12px",borderRadius:"var(--radius-sm)",cursor:"pointer"}}>
                  ✕ Cancella
                </button>
              )}
              <span style={{fontSize:12,color:"var(--text-2)",marginLeft:4}}>
                {searchSchede
                  ? <><b style={{color:"var(--accent)"}}>{gruppiFiltered.length}</b><span style={{color:"var(--text-3)"}}> / {gruppiList.length}</span> esercizi</>
                  : <><b style={{color:"var(--accent)"}}>{gruppiList.length}</b> esercizi</>
                }
              </span>
            </div>
          )}
          {gruppiList.length===0
            ? <div style={{textAlign:"center",padding:"80px 24px",color:"var(--text-3)"}}>
                <div style={{fontSize:52,marginBottom:16,opacity:.4}}>🏪</div>
                <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:22,color:"var(--text-2)"}}>Nessun esercizio registrato</div>
              </div>
            : gruppiFiltered.length===0
              ? <div style={{textAlign:"center",padding:"60px 24px",color:"var(--text-3)"}}>
                  <div style={{fontSize:40,marginBottom:12,opacity:.4}}>🔍</div>
                  <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,color:"var(--text-2)",marginBottom:6}}>Nessun risultato</div>
                  <div style={{fontSize:13}}>Nessun esercizio per <b style={{color:"var(--text-1)"}}>{searchSchede}</b></div>
                </div>
              : <div className="schede-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12,padding:"0 28px 48px"}}>
                  {gruppiFiltered.map(g=>{
                    const totV=g.interventi.reduce((s,r)=>s+(r.motivoControllo?.length||0),0);
                    const provSet=[...new Set(g.interventi.map(r=>r.provvedimento).filter(Boolean))];
                    return (
                      <div key={g.nomeEsercizio} className="card" style={{padding:20,cursor:"default",transition:"all .2s"}}
                        onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="var(--shadow-md)"}}
                        onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="var(--shadow-sm)"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--text-1)"}}>{g.nomeEsercizio}</div>
                            <div style={{fontSize:12,color:"var(--text-3)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.indirizzo}</div>
                          </div>
                          <div style={{background:"var(--accent)",color:"#0c0e14",borderRadius:999,padding:"3px 11px",fontSize:12,fontWeight:700,flexShrink:0,marginLeft:10}}>{g.interventi.length}</div>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 14px",marginBottom:14,fontSize:13}}>
                          <div><div style={{fontSize:11,color:"var(--text-3)",marginBottom:2}}>Titolare</div><div style={{color:"var(--text-1)"}}>{g.titolare||"—"}</div></div>
                          <div><div style={{fontSize:11,color:"var(--text-3)",marginBottom:2}}>Tipo</div><div style={{color:"var(--text-2)"}}>{g.tipo||"—"}</div></div>
                          <div><div style={{fontSize:11,color:"var(--text-3)",marginBottom:2}}>Violazioni</div><div style={{color:totV>0?"var(--red)":"var(--green)",fontWeight:600}}>{totV>0?totV:"✓ 0"}</div></div>
                          <div><div style={{fontSize:11,color:"var(--text-3)",marginBottom:2}}>Ultimo</div><div style={{color:"var(--text-2)"}}>{fmt(g.interventi[0]?.data)}</div></div>
                        </div>
                        {provSet.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>{provSet.map((p,i)=><Badge key={i} label={p} fg={pCol(p)} bg={pBg(p)}/>)}</div>}
                        <button onClick={()=>setScheda({esercizio:g,interventi:g.interventi})} className="btn-glass"
                          style={{width:"100%",color:"var(--accent)",borderColor:"rgba(226,201,126,0.25)",fontSize:13,padding:"9px"}}>
                          📋 Apri scheda · Genera PDF
                        </button>
                      </div>
                    );
                  })}
                </div>
          }
        </div>
      )}

      {view==="stats"&&(
        <StatsView records={records} tariffario={tariffario} db={dbRef.current} operatore={operatore} onOpenTariffario={()=>setShowTariffario(true)} onExportPDF={()=>{generaStatsPDF(records,tariffario);logAzione("report_pdf",`Esportato report statistico — ${records.length} record`);}}/>
      )}

      {/* FLOATING BULK ACTION BAR */}
      {selectedIds.size>0&&(
        <div className="no-print" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:80,background:"linear-gradient(180deg,transparent 0%,rgba(8,11,18,0.95) 35%)",padding:"36px 20px 20px",display:"flex",justifyContent:"center"}}>
          <div style={{background:"rgba(12,16,26,0.82)",borderRadius:"var(--radius-lg)",padding:"12px 20px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",boxShadow:"0 8px 32px rgba(0,0,0,.7), 0 0 0 0.5px rgba(255,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.12)",backdropFilter:"blur(28px)",WebkitBackdropFilter:"blur(28px)",maxWidth:760,width:"100%",justifyContent:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginRight:4}}>
              <div style={{background:"var(--accent)",color:"#0c0e14",borderRadius:999,padding:"2px 13px",fontSize:13,fontWeight:800}}>{selectedIds.size}</div>
              <span style={{fontSize:13,color:"var(--text-2)",fontWeight:500}}>selezionat{selectedIds.size===1?"o":"i"}</span>
            </div>
            <div style={{width:1,height:22,background:"var(--rim)",margin:"0 4px"}}/>
            <button onClick={()=>setShowBulkProv(true)} style={{background:"rgba(226,201,126,.1)",border:"none",color:"var(--accent)",fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:"var(--radius-sm)",cursor:"pointer",whiteSpace:"nowrap"}}>⚖️ Provvedimento</button>
            <button onClick={()=>setShowBulkAgenti(true)} style={{background:"rgba(126,184,247,.1)",border:"none",color:"var(--blue)",fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:"var(--radius-sm)",cursor:"pointer",whiteSpace:"nowrap"}}>👮 Assegna agenti</button>
            <button onClick={()=>{setMultiEditing(selectedRecords);clearSelection();}} style={{background:"var(--accent)",border:"none",color:"#0c0e14",fontSize:12,fontWeight:700,padding:"7px 16px",borderRadius:"var(--radius-sm)",cursor:"pointer",whiteSpace:"nowrap"}}>✏️ Modifica multipla</button>
            <div style={{width:1,height:22,background:"var(--rim)",margin:"0 4px"}}/>
            <button onClick={clearSelection} style={{background:"none",border:"none",color:"var(--text-3)",fontSize:12,padding:"7px 12px",borderRadius:"var(--radius-sm)",cursor:"pointer"}}>✕ Deseleziona</button>
          </div>
        </div>
      )}
      {/* FAB MOBILE */}
      <button className="mobile-only" onClick={()=>setShowAdd(true)} style={{
        display:"none",position:"fixed",bottom:24,right:20,zIndex:90,
        width:56,height:56,borderRadius:"50%",
        background:"var(--accent)",color:"#0c0e14",
        fontSize:28,fontWeight:700,border:"none",cursor:"pointer",
        boxShadow:"0 4px 20px rgba(226,201,126,.45)",
        alignItems:"center",justifyContent:"center"
      }}>+</button>

      {/* MODALI */}
      {showLog&&<LogViewer db={dbRef.current} onClose={()=>setShowLog(false)}/>}
      {showOperatori&&<GestioneOperatoriModal db={dbRef.current} onClose={()=>setShowOperatori(false)}/>}
      {showTariffario&&<TariffarioModal tariffario={tariffario} onClose={()=>setShowTariffario(false)} onSave={saveTariffario}/>}
      {(showAdd||editing)&&<AddModal initial={editing} operatore={operatore} onClose={()=>{setShowAdd(false);setEditing(null);}} onSave={handleSave}/>}
      {showImport&&<ImportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}
      {detail&&<DetailModal record={detail} onClose={()=>setDetail(null)} onDelete={id=>{setConfirm(id);setDetail(null);}} onEdit={r=>{setEditing(r);setDetail(null);}}/>}
      {scheda&&<SchedaModal esercizio={scheda.esercizio} interventi={scheda.interventi} onClose={()=>setScheda(null)} onPDF={()=>logAzione("scheda_pdf",`Scheda PDF: ${scheda.esercizio.nomeEsercizio} — ${scheda.interventi.length} interventi`)}/>}
      {showBulkProv&&<BulkProvModal count={selectedIds.size} onApply={handleBulkProv} onClose={()=>setShowBulkProv(false)}/>}
      {showBulkAgenti&&<BulkAgentiModal count={selectedIds.size} onApply={handleBulkAgenti} onClose={()=>setShowBulkAgenti(false)}/>}
      {multiEditing&&<MultiEditModal initialRecords={multiEditing} operatore={operatore} onSave={handleMultiEditSave} onClose={()=>setMultiEditing(null)}/>}
      {showCorrector&&<DataCorrectorModal records={records} db={dbRef.current} operatore={operatore} onClose={()=>setShowCorrector(false)} onDone={()=>{}}/>}
      {showCorrectorComm&&<CommercialeCorrectorModal records={records} db={dbRef.current} operatore={operatore} onClose={()=>setShowCorrectorComm(false)}/>}
      {showReport&&<ReportAvanzatiModal records={records} onClose={()=>setShowReport(false)}/>}
      {confirmDeleteAll&&(()=>{
        const DeleteAllModal = () => {
          const [confirmText,setConfirmText]=useState("");
          const [deleting,setDeleting]=useState(false);
          const confirmed = confirmText.toUpperCase()==="ELIMINA";
          return (
            <Overlay onBgClick={()=>setConfirmDeleteAll(false)}>
              <div className="overlay-modal" style={{background:"rgba(255,255,255,0.05)",border:"2px solid #e05252",borderRadius:14,width:"100%",maxWidth:460,padding:28}}>
                <div style={{textAlign:"center",marginBottom:16}}>
                  <div style={{fontSize:48,marginBottom:10}}>⚠️</div>
                  <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:22,fontWeight:700,color:"var(--red)"}}>Eliminazione totale</div>
                  <div style={{fontSize:13,color:"var(--text-2)",marginTop:6,lineHeight:1.6}}>
                    Stai per eliminare <b style={{color:"var(--red)"}}>{records.length} record</b> dal database.<br/>Questa azione è <b>irreversibile</b> e riguarda tutti gli operatori.
                  </div>
                </div>
                <div style={{background:"rgba(224,82,82,.1)",border:"1px solid #e0525240",borderRadius:8,padding:"14px",marginBottom:18,fontSize:12,color:"#ff9090",lineHeight:1.6,textAlign:"center"}}>
                  Per confermare, scrivi <b style={{color:"var(--text-1)",fontSize:14}}>ELIMINA</b> nel campo sottostante
                </div>
                <input value={confirmText} onChange={e=>setConfirmText(e.target.value)}
                  placeholder='Scrivi "ELIMINA" per confermare'
                  style={{...INP,textAlign:"center",fontSize:16,fontWeight:700,letterSpacing:"0.1em",marginBottom:18,
                    borderColor:confirmed?"#e05252":"#2a3049",color:confirmed?"#e05252":"#e8e6df"}}
                  autoFocus/>
                <div style={{display:"flex",justifyContent:"center",gap:10}}>
                  <button onClick={()=>setConfirmDeleteAll(false)} style={{background:"none",border:"1px solid var(--rim)",color:"var(--text-2)",fontSize:14,padding:"9px 20px",borderRadius:7,cursor:"pointer"}}>Annulla</button>
                  <button disabled={!confirmed||deleting} onClick={async()=>{setDeleting(true);await handleDeleteAll();}} style={{
                    background:confirmed&&!deleting?"#e05252":"rgba(224,82,82,.1)",
                    color:confirmed&&!deleting?"#fff":"#5a1a1a",
                    fontSize:14,fontWeight:700,padding:"9px 24px",border:"none",borderRadius:7,
                    cursor:confirmed?"pointer":"not-allowed"
                  }}>
                    {deleting?`⏳ Eliminazione in corso…`:`🗑 Elimina ${records.length} record`}
                  </button>
                </div>
              </div>
            </Overlay>
          );
        };
        return <DeleteAllModal/>;
      })()}
      {confirm&&(
        <Overlay onBgClick={()=>setConfirm(null)}>
          <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid #5a1a1a",borderRadius:12,padding:28,maxWidth:380,width:"100%"}}>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:20,fontWeight:700,marginBottom:10}}>Conferma eliminazione</div>
            <p style={{fontSize:14,color:"var(--text-2)",marginBottom:24,lineHeight:1.6}}>Sei sicuro? Il record verrà eliminato per tutti gli operatori.</p>
            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={()=>setConfirm(null)} style={{background:"none",border:"1px solid var(--rim)",color:"var(--text-2)",fontSize:13,padding:"7px 16px",borderRadius:7,cursor:"pointer"}}>Annulla</button>
              <button onClick={()=>handleDelete(confirm)} style={{background:"#5a1a1a",border:"1px solid #8c2f2f",color:"var(--red)",fontSize:13,fontWeight:600,padding:"7px 16px",borderRadius:7,cursor:"pointer"}}>🗑 Elimina</button>
            </div>
          </div>
        </Overlay>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
