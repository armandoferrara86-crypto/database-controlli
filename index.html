const DEFAULT_TARIFFARIO = [

const CFG_KEY = "pm-firebase-config";

// ─── REGOLE REPORT RA (mappatura registro → voci report mensile) ─────────────
// Ogni record può contare in PIÙ voci contemporaneamente.
// match: (testo completo del record) → true se il controllo conta in questa voce

const REGOLE_RA = [

// Testo completo di un record per il matching RA
function testoRecordRA(r){
  const ags = Array.isArray(r.agentiOp)?r.agentiOp.join(" "):(r.agentiOp||"");
  return [
    r.tipo||"", r.tipoAttivita||"", r.nomeEsercizio||"",
    ...(r.motivoControllo||[]), ...(r.violazioniRiscontrate||[]),
    ...(r.titoliAutorizzativi||[]), r.note||"", ags
  ].join(" ").toLowerCase();
}

// Il record conta come CONTROLLO nella voce?
function recordInVoceRA(r, regola){
  if(regola.matchTipoAttivita && r.tipoAttivita===regola.matchTipoAttivita) return true;
  const testo = testoRecordRA(r);
  return regola.keywords.some(kw => testo.includes(kw));
}

// Quante VIOLAZIONI del record contano nella voce?
function violazioniInVoceRA(r, regola){
  const viols = r.violazioniRiscontrate||[];
  if(!viols.length) return 0;
  // Se il record non appartiene alla voce, nessuna violazione conta
  if(!recordInVoceRA(r, regola)) return 0;
  const kws = regola.vKeywords || regola.keywords;
  const matched = viols.filter(v => kws.some(kw => v.toLowerCase().includes(kw)));
  // Se nessuna violazione matcha specificamente ma il record è nella voce con violazioni generiche,
  // per le voci "totali" (sede fissa, pubblici esercizi, leggi regionali) contiamo tutte le violazioni
  if(matched.length===0 && ["sede_fissa","pubb_esercizi","leggi_reg","bb_lr5","vicinato"].includes(regola.id)) return viols.length;
  return matched.length;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
const fmt   = iso => { if(!iso) return "—"; const p=iso.split("-"); if(p.length===3) return `${p[2]}/${p[1]}/${p[0]}`; const d=new Date(iso); return isNaN(d)?iso:`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`; };
const fmtTs = ts  => { if(!ts) return "—"; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); };
const toLocalISO = d => { const dd=String(d.getDate()).padStart(2,"0"); const mm=String(d.getMonth()+1).padStart(2,"0"); return `${d.getFullYear()}-${mm}-${dd}`; };

// Normalizza qualsiasi formato data in YYYY-MM-DD (formato interno standard)
// Gestisce: DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY, YYYY-MM-DD, YYYY/MM/DD, D/M/YY, timestamp
function normalizzaData(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  if(!s) return null;

  // Già nel formato corretto YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // YYYY/MM/DD o YYYY.MM.DD
  let m = s.match(/^(\d{4})[\/\.](\d{1,2})[\/\.](\d{1,2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;

  // DD/MM/YYYY, DD-MM-YYYY, DD.MM.YYYY (formato europeo)
  m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;

  // Formato con anno a 2 cifre: può essere AA-MM-GG oppure GG-MM-AA
  m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
  if(m){
    const p1=parseInt(m[1]), p2=parseInt(m[2]), p3=parseInt(m[3]);
    // Se il PRIMO numero è un anno plausibile (24-29) e il secondo è un mese valido → AA-MM-GG
    if(p1>=24 && p1<=29 && p2>=1 && p2<=12 && p3>=1 && p3<=31)
      return `20${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
    // Se il TERZO numero è un anno plausibile (24-29) → GG-MM-AA
    if(p3>=24 && p3<=29 && p2>=1 && p2<=12 && p1>=1 && p1<=31)
      return `20${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
    // Fallback: giorno-mese-anno europeo
    if(p2>=1 && p2<=12 && p1>=1 && p1<=31)
      return `20${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  }

  // YYYY-M-D con cifre singole
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;

  // Prova parsing nativo come ultima spiaggia
  const d = new Date(s);
  if(!isNaN(d.getTime())) return toLocalISO(d);

  return null; // non riconosciuto
}
const pCol  = (p="") => { const l=p.toLowerCase(); if(l.includes("denuncia")) return "#e05252"; if(l.includes("segnalazione")) return "#c9a84c"; if(l.includes("diffida")) return "#7eb8f7"; return "#7a859e"; };
const pBg   = (p="") => { const l=p.toLowerCase(); if(l.includes("denuncia")) return "#3a1212"; if(l.includes("segnalazione")) return "#3a2e0e"; if(l.includes("diffida")) return "#1a2640"; return "#252d42"; };
// Colori per categoria violazione
const violColor = v => {
  const l = (v||"").toLowerCase();
  if(l.includes("scia") || l.includes("licen") || l.includes("autoriz") || l.includes("abili") || l.includes("titolo")) return {fg:"#7eb8f7", bg:"#1a2640"};
  if(l.includes("sanitar") || l.includes("igien") || l.includes("aliment") || l.includes("haccp")) return {fg:"#52b788", bg:"#1a3d2e"};
  if(l.includes("acustic") || l.includes("rumor") || l.includes("musica") || l.includes("impatto")) return {fg:"#b07af7", bg:"#2a1a40"};
  if(l.includes("suolo") || l.includes("dehors") || l.includes("insegn") || l.includes("pubblic")) return {fg:"#f7a052", bg:"#3a2010"};
  if(l.includes("alcol") || l.includes("alcool") || l.includes("vendi")) return {fg:"#e05252", bg:"#3a1212"};
  if(l.includes("nota") || l.includes("segnala") || l.includes("uffici")) return {fg:"#c9a84c", bg:"#3a2e0e"};
  return {fg:"#ff9090", bg:"#3a1212"};
};
const hCol  = s => { const c=["#c9a84c","#7eb8f7","#52b788","#e05252","#b07af7","#f7a052"]; let h=0; for(let ch of (s||"a")) h=(h*31+ch.charCodeAt(0))%c.length; return c[h]; };
const ini   = n => (n||"?").split(" ").map(w=>w[0]?.toUpperCase()||"").join("").slice(0,2)||"?";

// ─── MAPPATURA EXCEL → APP ───────────────────────────────────────────────────
function mapExcelRow(row) {
  // Colonne: A=0 B=1 C=2 D=3 E=4 F=5 G=6 H=7 I=8 J=9 K=10 L=11 M=12 N=13 O=14 P=15 Q=16 R=17
  const get = i => { const v = row[i]; return (v===null||v===undefined) ? "" : String(v).trim(); };

  // Data
  let data = "";
  const rawData = row[0];
  if(rawData instanceof Date) {
    data = toLocalISO(rawData);
  } else if(typeof rawData === "number") {
    // Excel serial date
    const d = new Date(Math.round((rawData - 25569) * 86400 * 1000));
    data = toLocalISO(d);
  } else if(rawData) {
    const parts = String(rawData).split("/");
    if(parts.length===3) data = `${parts[2]}-${parts[1].padStart(2,"0")}-${parts[0].padStart(2,"0")}`;
  }

  // Indirizzo = via + civico
  const indirizzo = [get(2), get(3)].filter(Boolean).join(" ").trim();

  // Tipo attività: se H è "ALTRO" usa la colonna I
  const tipoH = get(7);
  const tipoI = get(8);
  const tipo = tipoH.toUpperCase()==="ALTRO" ? tipoI : tipoH;

  // Titoli autorizzativi: colonne J-O (indice 9-14)
  const labelsTitoli = ["SCIA Somministrazione/Vicinato","SCIA Sanitaria","Occupazione Suolo Pubblico","Insegne","Impatto Acustico","Vendita Alcolici"];
  const titoliAutorizzativi = [];
  for(let i=9; i<=14; i++) {
    const v = get(i);
    if(v && v.toUpperCase()!=="NO" && v.toUpperCase()!=="N/A" && v!=="") {
      titoliAutorizzativi.push(`${labelsTitoli[i-9]}: ${v}`);
    }
  }

  // Violazioni: motivo controllo (P=15)
  const motivo = get(15);
  const motivoControllo = motivo ? [motivo] : [];

  // Note: esiti controllo (Q=16)
  const note = get(16);

  // Provvedimento: diffida (R=17)
  const diffidaVal = get(17).toUpperCase();
  const provvedimento = (diffidaVal==="SÌ"||diffidaVal==="SI"||diffidaVal==="YES"||diffidaVal==="Y") ? "Diffida" : "";

  // Operatore: agenti operanti (B=1)
  const agenti = get(1);

  return {
    data,
    ora: "",
    numeroVerbale: "",
    nomeEsercizio: get(4),  // E
    indirizzo,
    titolare: get(5),        // F
    piva: get(6),            // G
    tipo,
    motivoControllo,
    provvedimento,
    note,
    titoliAutorizzativi,
    riferimenti: [],
    _agenti: agenti,         // salvato separatamente per mostrarlo
  };
}

// ─── TAG INPUT ────────────────────────────────────────────────────────────────
function TagInput({tags,onChange,placeholder}){
  const [input,setInput]=useState(""); const ref=useRef();
  const add=()=>{ const v=input.trim(); if(v&&!tags.includes(v)) onChange([...tags,v]); setInput(""); };
  return (
    <div>
      <div onClick={()=>ref.current?.focus()} style={{background:"#1e2334",border:"1px solid #2a3049",borderRadius:7,padding:"6px 10px",display:"flex",flexWrap:"wrap",gap:6,cursor:"text",minHeight:42}}>
        {tags.map((t,i)=>(
          <span key={i} style={{background:"#252d42",border:"1px solid #2a3049",borderRadius:5,fontSize:12,padding:"2px 8px",display:"flex",alignItems:"center",gap:4,color:"#e8e6df"}}>
            {t}<button onClick={()=>onChange(tags.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#7a859e",cursor:"pointer",fontSize:14,lineHeight:1,padding:0}}>×</button>
          </span>
        ))}
        <input ref={ref} value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();add();}}}
          placeholder={tags.length===0?placeholder:""}
          style={{background:"none",border:"none",outline:"none",color:"#e8e6df",fontSize:14,minWidth:160,flex:1}}/>
      </div>
      <p style={{fontSize:11,color:"#7a859e",marginTop:4}}>Premi Invio o virgola per aggiungere</p>
    </div>
  );
}

// ─── IMPORT EXCEL MODAL ───────────────────────────────────────────────────────
function ImportModal({onClose, onImport}){
  const [rows, setRows]       = useState(null);
  const [loading, setLoading] = useState(false);
  const [importing, setImporting] = useState(false);
  const [done, setDone]       = useState(false);
  const [error, setError]     = useState("");
  const fileRef = useRef();

  const handleFile = e => {
    const file = e.target.files[0];
    if(!file) return;
    setLoading(true); setError("");
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const wb = XLSX.read(evt.target.result, {type:"array", cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false, dateNF:"yyyy-mm-dd"});
        // Skip header row
        const dataRows = raw.slice(1).filter(r => r.some(c=>c!==null&&c!==""));
        const mapped = dataRows.map(r => mapExcelRow(r)).filter(r=>r.nomeEsercizio);
        setRows(mapped);
      } catch(e) {
        setError("Errore nella lettura del file. Assicurati che sia un file .xlsx valido.");
      }
      setLoading(false);
    };
    reader.readAsArrayBuffer(file);
  };

  const handleImport = async () => {
    if(!rows?.length) return;
    setImporting(true);
    await onImport(rows);
    setDone(true);
    setImporting(false);
  };

  return (
    <Overlay onBgClick={onClose}>
      <div style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:14,width:"100%",maxWidth:680,padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:22,fontWeight:700}}>Importa da Excel</div>
            <div style={{fontSize:12,color:"#7a859e",marginTop:3}}>Legge automaticamente le colonne della tua BANCA_DATI</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7a859e",cursor:"pointer",fontSize:24,lineHeight:1}}>×</button>
        </div>

        {!done ? <>
          {/* MAPPATURA COLONNE */}
          <div style={{background:"#0f1117",border:"1px solid #2a3049",borderRadius:9,padding:"14px 16px",marginBottom:18,fontSize:12}}>
            <div style={{fontSize:10,color:"#c9a84c",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,marginBottom:10}}>Mappatura colonne rilevata</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 24px",color:"#7a859e"}}>
              {[["Data del controllo","→ Data"],["Denominazione attività","→ Nome esercizio"],["Indirizzo + Civico","→ Indirizzo"],["Condotto da","→ Titolare"],["Partita IVA","→ P.IVA"],["Tipologia attività","→ Tipo attività"],["SCIA, Sanitaria, OSP…","→ Titoli autorizzativi"],["Motivo controllo","→ Violazioni"],["Esiti controllo","→ Note"],["Diffida D.Lgs. 103/2024","→ Provvedimento"],["Agenti operanti","→ Campo operatore"]].map(([a,b],i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{color:"#e8e6df",minWidth:190}}>{a}</span>
                  <span style={{color:"#52b788",fontSize:11}}>{b}</span>
                </div>
              ))}
            </div>
          </div>

          {/* CARICA FILE */}
          <div style={{border:"2px dashed #2a3049",borderRadius:10,padding:"28px 20px",textAlign:"center",marginBottom:16,cursor:"pointer",background:"#0f1117"}}
            onClick={()=>fileRef.current?.click()}
            onDragOver={e=>e.preventDefault()}
            onDrop={e=>{e.preventDefault(); const f=e.dataTransfer.files[0]; if(f){fileRef.current.files=e.dataTransfer.files; handleFile({target:{files:[f]}});}}}>
            <div style={{fontSize:36,marginBottom:10}}>📂</div>
            <div style={{fontWeight:600,marginBottom:4}}>Clicca per selezionare il file Excel</div>
            <div style={{fontSize:12,color:"#7a859e"}}>oppure trascinalo qui — formato .xlsx</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}}/>
          </div>

          {error&&<div style={{background:"#3a1212",border:"1px solid #e0525240",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#ff9090",marginBottom:14}}>{error}</div>}

          {loading&&<div style={{textAlign:"center",padding:"16px",color:"#7a859e",fontSize:14}}>⏳ Lettura file in corso…</div>}

          {rows&&!loading&&(
            <div style={{marginBottom:16}}>
              <div style={{background:"#1a3d2e",border:"1px solid #52b78840",borderRadius:8,padding:"12px 16px",marginBottom:12,fontSize:13,color:"#52b788"}}>
                ✅ Trovate <b>{rows.length} righe</b> valide pronte per l'importazione
              </div>
              {/* Anteprima prime 3 righe */}
              <div style={{fontSize:11,color:"#7a859e",marginBottom:8,letterSpacing:"0.06em",textTransform:"uppercase"}}>Anteprima (prime 3 righe)</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto"}}>
                {rows.slice(0,3).map((r,i)=>(
                  <div key={i} style={{background:"#0f1117",border:"1px solid #2a3049",borderRadius:7,padding:"10px 12px",fontSize:12}}>
                    <div style={{fontWeight:600,marginBottom:3}}>{r.nomeEsercizio} <span style={{color:"#7a859e",fontWeight:400}}>— {r.indirizzo}</span></div>
                    <div style={{color:"#7a859e"}}>
                      {fmt(r.data)} · {r.tipo} · Titolare: {r.titolare||"—"}
                      {r.provvedimento&&<span style={{marginLeft:8,color:"#7eb8f7"}}>· {r.provvedimento}</span>}
                    </div>

                ))}
                {rows.length>3&&<div style={{fontSize:11,color:"#7a859e",textAlign:"center",padding:"6px"}}>…e altri {rows.length-3} record</div>}

            <button disabled={!rows||importing} onClick={handleImport} style={{
              background:rows&&!importing?"#c9a84c":"#5a4a1e",color:rows&&!importing?"#0f1117":"#7a6030",
              fontSize:14,fontWeight:700,padding:"8px 22px",border:"none",borderRadius:7,cursor:rows?"pointer":"not-allowed"
            }}>
              {importing?`⏳ Importazione in corso…`:`⬆ Importa ${rows?rows.length:""} record nel database`}
            </button>
          </div>
        </> : (
          <div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:52,marginBottom:16}}>🎉</div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:22,fontWeight:700,marginBottom:8}}>Importazione completata!</div>
            <div style={{fontSize:14,color:"#7a859e",marginBottom:24}}>Tutti i record sono stati caricati nel database condiviso.</div>
            <button onClick={onClose} style={{background:"#c9a84c",color:"#0f1117",fontSize:14,fontWeight:700,padding:"10px 28px",border:"none",borderRadius:8,cursor:"pointer"}}>Vai al registro →</button>
          </div>
        )}
      </div>
    </Overlay>
  );
}

// ─── SETUP ────────────────────────────────────────────────────────────────────
function SetupScreen({onSave}){
  const [cfg,setCfg]=useState({apiKey:"",authDomain:"",projectId:"",storageBucket:"",messagingSenderId:"",appId:""});
  const [raw,setRaw]=useState(""); const [error,setError]=useState("");
  const handlePaste=e=>{
    const text=e.target.value; setRaw(text); setError("");
    try{
      const parsed={};
      [["apiKey",/apiKey:\s*["'](.+?)["']/],["authDomain",/authDomain:\s*["'](.+?)["']/],["projectId",/projectId:\s*["'](.+?)["']/],["storageBucket",/storageBucket:\s*["'](.+?)["']/],["messagingSenderId",/messagingSenderId:\s*["'](.+?)["']/],["appId",/appId:\s*["'](.+?)["']/]]
        .forEach(([k,re])=>{ const m=text.match(re); if(m) parsed[k]=m[1]; });
      if(Object.keys(parsed).length>=3) setCfg(p=>({...p,...parsed}));
    }catch(_){}
  };
  const valid=Object.values(cfg).every(v=>v.trim().length>0);
  const handleSave=()=>{
    if(!valid){setError("Compila tutti i campi o incolla il blocco di configurazione."); return;}
    try{ firebase.app(); firebase.app().delete(); }catch(_){}
    try{ firebase.initializeApp(cfg); firebase.firestore(); localStorage.setItem(CFG_KEY,JSON.stringify(cfg)); onSave(cfg); }
    catch(e){ setError("Configurazione non valida. Controlla i valori e riprova."); }
  };
  return (
    <div style={{minHeight:"100vh",background:"#0f1117",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"40px 16px"}}>
      <div style={{width:"100%",maxWidth:560}}>
        <div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:48,marginBottom:12}}>🔥</div><div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:26,fontWeight:700}}>Configura il database</div><div style={{fontSize:14,color:"#7a859e",marginTop:6}}>Operazione da fare una sola volta.</div></div>
        <div style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:12,padding:22,marginBottom:14}}>
          <div style={{fontWeight:600,marginBottom:10}}>Incolla il blocco firebaseConfig copiato da Firebase</div>
          <p style={{fontSize:13,color:"#7a859e",lineHeight:1.7,marginBottom:10}}>Vai su <a href="https://console.firebase.google.com" target="_blank" style={{color:"#c9a84c"}}>console.firebase.google.com</a> → il tuo progetto → ⚙️ Impostazioni → sezione "Le tue app" → copia il blocco <code style={{background:"#252d42",padding:"1px 5px",borderRadius:4,color:"#c9a84c"}}>firebaseConfig</code>.</p>
          <textarea value={raw} onChange={handlePaste} placeholder={"Incolla qui il blocco firebaseConfig...\n\nconst firebaseConfig = {\n  apiKey: \"...\",\n  ...\n};"} style={{...INP,minHeight:130,resize:"vertical",fontFamily:"monospace",fontSize:12,lineHeight:1.7}}/>
          {Object.values(cfg).some(v=>v.length>0)&&<div style={{background:"#1a3d2e",border:"1px solid #52b78840",borderRadius:7,padding:"8px 12px",marginTop:8,fontSize:12,color:"#52b788"}}>✅ Valori rilevati automaticamente!</div>}
        </div>
        {error&&<div style={{background:"#3a1212",border:"1px solid #e0525240",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#ff9090",marginBottom:12}}>{error}</div>}
        <button onClick={handleSave} style={{width:"100%",background:valid?"#c9a84c":"#5a4a1e",color:valid?"#0f1117":"#7a6030",fontSize:15,fontWeight:700,padding:"12px",border:"none",borderRadius:9,cursor:valid?"pointer":"not-allowed"}}>🚀 Connetti il database e avvia l'app</button>
        <p style={{fontSize:11,color:"#7a859e",textAlign:"center",marginTop:10}}>La configurazione viene salvata nel browser.</p>
      </div>
    </div>
  );
}

function LogViewer({db, onClose}){
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterOp,setFilterOp]=useState("");
  const [filterAzione,setFilterAzione]=useState("");
  const [operatori,setOperatori]=useState([]);
  const [periodo,setPeriodo]=useState("7"); // giorni

  useEffect(()=>{
    const cut = new Date();
    cut.setDate(cut.getDate()-parseInt(periodo||7));
    const unsub = db.collection(COLL_LOG)
      .orderBy("timestamp","desc")
      .limit(500)
      .onSnapshot(snap=>{
        setLogs(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      });
    return ()=>unsub();
  },[periodo]);

  useEffect(()=>{
    db.collection(COLL_OPS).get().then(snap=>{
      setOperatori(snap.docs.map(d=>d.data().nome));
    });
  },[]);

  const filtered = logs.filter(l=>{
    const mOp = !filterOp || (l.operatore||"").toLowerCase().includes(filterOp.toLowerCase());
    const mAz = !filterAzione || l.azione===filterAzione;
    return mOp && mAz;
  });

  const fmtLog = ts => {
    if(!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"});
  };

  // Raggruppa per operatore per riepilogo
  const perOp = {};
  logs.forEach(l=>{ const k=l.operatore||"?"; perOp[k]=(perOp[k]||0)+1; });
  const topOp = Object.entries(perOp).sort(([,a],[,b])=>b-a);

  return (
    <Overlay onBgClick={onClose}>
      <div style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:14,width:"100%",maxWidth:860,padding:28}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:22,fontWeight:700}}>📋 Log attività</div>
            <div style={{fontSize:12,color:"#7a859e",marginTop:3}}>Cronologia completa di tutte le azioni effettuate</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7a859e",cursor:"pointer",fontSize:24,lineHeight:1}}>×</button>
        </div>

        {/* Riepilogo per operatore */}
        {topOp.length>0&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {topOp.map(([nome,n])=>(
              <div key={nome} style={{background:"#0f1117",border:"1px solid #2a3049",borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}
                onClick={()=>setFilterOp(filterOp===nome?"":nome)}>
                <Avatar name={nome} size={22}/>
                <span style={{fontSize:13,color:filterOp===nome?"#c9a84c":"#e8e6df"}}>{nome}</span>
                <span style={{background:"#252d42",color:"#c9a84c",fontSize:11,padding:"1px 7px",borderRadius:10,fontWeight:700}}>{n}</span>
              </div>
            ))}
          </div>
        )}

        {/* Filtri */}
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <select value={periodo} onChange={e=>setPeriodo(e.target.value)}
            style={{...INP,width:"auto",cursor:"pointer",borderRadius:7,padding:"6px 10px",fontSize:12}}>
            <option value="1">Ultime 24 ore</option>
            <option value="7">Ultimi 7 giorni</option>
            <option value="30">Ultimi 30 giorni</option>
            <option value="90">Ultimi 90 giorni</option>
            <option value="3650">Tutto</option>
          </select>
          <input placeholder="Filtra per operatore…" value={filterOp} onChange={e=>setFilterOp(e.target.value)}
            style={{...INP,width:180,fontSize:12,padding:"6px 10px"}}/>
          <select value={filterAzione} onChange={e=>setFilterAzione(e.target.value)}
            style={{...INP,width:"auto",cursor:"pointer",borderRadius:7,padding:"6px 10px",fontSize:12}}>
            <option value="">Tutte le azioni</option>
            {Object.entries(AZIONI_LABEL).map(([k,v])=>(
              <option key={k} value={k}>{v.icon} {v.label}</option>
            ))}
          </select>
          <span style={{fontSize:12,color:"#7a859e",alignSelf:"center",marginLeft:4}}>
            {filtered.length} eventi
          </span>
        </div>

        {/* Tabella log */}
        <div style={{maxHeight:460,overflowY:"auto",border:"1px solid #2a3049",borderRadius:8}}>
          {loading
            ?<div style={{textAlign:"center",padding:32,color:"#7a859e"}}>⏳ Caricamento…</div>
            :filtered.length===0
              ?<div style={{textAlign:"center",padding:32,color:"#7a859e"}}>Nessun evento trovato</div>
              :<table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead style={{position:"sticky",top:0,zIndex:1}}>
                  <tr style={{background:"#0f1117",borderBottom:"2px solid #2a3049"}}>
                    {["Data e ora","Operatore","Azione","Dettaglio"].map(h=>(
                      <th key={h} style={{fontSize:10,color:"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",padding:"8px 12px",textAlign:"left",fontWeight:500}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((l,i)=>{
                    const az = AZIONI_LABEL[l.azione]||{icon:"•",label:l.azione,color:"#7a859e"};
                    return (
                      <tr key={l.id} style={{borderBottom:"1px solid #2a3049",background:i%2===0?"transparent":"#1a1e2a"}}>
                        <td style={{padding:"8px 12px",fontSize:11,color:"#7a859e",whiteSpace:"nowrap"}}>{fmtLog(l.timestamp)}</td>
                        <td style={{padding:"8px 12px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:7}}>
                            <Avatar name={l.operatore||"?"} size={20}/>
                            <span style={{fontSize:12,color:"#e8e6df"}}>{l.operatore||"—"}</span>
                            {l.matricola&&<span style={{fontSize:10,color:"#7a859e"}}>({l.matricola})</span>}
                          </div>
                        </td>
                        <td style={{padding:"8px 12px",whiteSpace:"nowrap"}}>
                          <span style={{background:az.color+"25",color:az.color,fontSize:11,padding:"2px 8px",borderRadius:999,fontWeight:600}}>
                            {az.icon} {az.label}
                          </span>
                        </td>
                        <td style={{padding:"8px 12px",fontSize:11,color:"#7a859e",maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {l.dettaglio||"—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
          }
        </div>

        <div style={{display:"flex",justifyContent:"flex-end",paddingTop:14,marginTop:14,borderTop:"1px solid #2a3049"}}>
          <button onClick={onClose} style={{background:"none",border:"1px solid #2a3049",color:"#7a859e",fontSize:13,padding:"7px 16px",borderRadius:7,cursor:"pointer"}}>Chiudi</button>
        </div>
      </div>
    </Overlay>
  );
}

    const unsub = db.collection(COLL_OPS).orderBy("nome").onSnapshot(snap=>{
      setOperatori(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
    return ()=>unsub();
  },[]);

  const aggiungi = async () => {
    if(!nuovoNome.trim()) return;
    setSaving(true); setErrore("");
    try {
      const esiste = operatori.find(o=>o.nome.toLowerCase()===nuovoNome.trim().toLowerCase());
      if(esiste){ setErrore("Operatore già presente in lista."); setSaving(false); return; }
      await db.collection(COLL_OPS).add({nome:nuovoNome.trim(), matricola:nuovaMatricola.trim(), aggiuntoIl:firebase.firestore.FieldValue.serverTimestamp()});
      setNuovoNome(""); setNuovaMatricola("");
    } catch(e){ setErrore("Errore nel salvataggio."); }
    setSaving(false);
  };

  const rimuovi = async (id, nome) => {
    if(!window.confirm(`Rimuovere "${nome}" dalla lista degli autorizzati?`)) return;
    await db.collection(COLL_OPS).doc(id).delete();
  };

  return (
    <Overlay onBgClick={onClose}>
      <div style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:14,width:"100%",maxWidth:560,padding:28}}>

        </div>

        {/* Avviso se lista vuota */}
        {!loading&&operatori.length===0&&(
          <div style={{background:"#3a2e0e",border:"1px solid #c9a84c40",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#c9a84c",marginBottom:16,lineHeight:1.6}}>
            ⚠️ La lista è vuota — l'accesso è <b>aperto a tutti</b>. Aggiungi almeno un operatore per attivare il controllo accessi.
          </div>
        )}

        {/* Lista operatori */}
        <div style={{maxHeight:300,overflowY:"auto",marginBottom:16}}>
          {loading
            ?<div style={{textAlign:"center",padding:20,color:"#7a859e",fontSize:13}}>⏳ Caricamento…</div>
            :operatori.length===0
              ?<div style={{textAlign:"center",padding:20,color:"#7a859e",fontSize:13}}>Nessun operatore aggiunto</div>
              :<table style={{width:"100%",borderCollapse:"collapse"}}>

                    <th style={{fontSize:10,color:"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",padding:"6px 10px",textAlign:"left",fontWeight:500}}>Nome e Cognome</th>
                    <th style={{fontSize:10,color:"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",padding:"6px 10px",textAlign:"left",fontWeight:500}}>Matricola</th>
                    <th style={{width:40}}></th>
                  </tr>
                </thead>
                <tbody>
                  {operatori.map(op=>(
                    <tr key={op.id} style={{borderBottom:"1px solid #2a3049"}}>
                      <td style={{padding:"9px 10px",fontSize:14,fontWeight:600}}>{op.nome}</td>
                      <td style={{padding:"9px 10px",fontSize:13,color:"#7a859e"}}>{op.matricola||"—"}</td>
                      <td style={{padding:"9px 10px",textAlign:"center"}}>
                        <button onClick={()=>rimuovi(op.id,op.nome)}
                          style={{background:"none",border:"none",color:"#e05252",cursor:"pointer",fontSize:16}} title="Rimuovi">🗑</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>

        {/* Aggiungi nuovo operatore */}
        <div style={{background:"#0f1117",border:"1px solid #2a3049",borderRadius:8,padding:14,marginBottom:14}}>
          <div style={{fontSize:11,color:"#c9a84c",letterSpacing:"0.07em",textTransform:"uppercase",fontWeight:600,marginBottom:10}}>+ Aggiungi operatore</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 140px auto",gap:8,alignItems:"center"}}>
            <input placeholder="Nome e Cognome *" value={nuovoNome}
              onChange={e=>{setNuovoNome(e.target.value);setErrore("");}}

              style={{...INP,fontSize:13,padding:"7px 10px"}}/>
            <input placeholder="Matricola" value={nuovaMatricola}
              onChange={e=>setNuovaMatricola(e.target.value)}

            <button onClick={aggiungi} disabled={!nuovoNome.trim()||saving}
              style={{background:nuovoNome.trim()?"#c9a84c":"#5a4a1e",color:nuovoNome.trim()?"#0f1117":"#7a6030",border:"none",borderRadius:7,padding:"7px 14px",fontWeight:700,fontSize:13,cursor:nuovoNome.trim()?"pointer":"not-allowed",whiteSpace:"nowrap"}}>

        </div>
      </div>
    </Overlay>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin, db}){
  const [nome,setNome]=useState("");
  const [matricola,setMatricola]=useState("");
  const [checking,setChecking]=useState(false);
  const [errore,setErrore]=useState("");
  const valid=nome.trim().length>=2;

  const handleAccedi = async () => {
    if(!valid) return;
    setChecking(true); setErrore("");
    try {
      const snap = await db.collection(COLL_OPS).get();
      if(snap.empty) {
        // Nessun operatore in lista → accesso libero (primo avvio)
        onLogin(nome.trim(), matricola.trim());
        return;
      }
      const lista = snap.docs.map(d=>d.data());
      const nomeInput = nome.trim().toLowerCase();
      const matInput  = matricola.trim().toLowerCase();
      const trovato = lista.find(op => {
        const nomeOk = op.nome.toLowerCase() === nomeInput;
        // Se ha matricola in lista, deve corrispondere; se è vuota in lista, basta il nome
        const matOk  = !op.matricola || op.matricola.toLowerCase() === matInput;
        return nomeOk && matOk;
      });
      if(trovato) {
        onLogin(trovato.nome, trovato.matricola||matricola.trim());
      } else {
        setErrore("Accesso negato. Nome o matricola non autorizzati. Contatta l'amministratore.");
      }
    } catch(e) {
      setErrore("Errore di connessione. Riprova.");
    }
    setChecking(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#0f1117",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:16,padding:36,maxWidth:400,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:12}}>🏛</div>
          <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:24,fontWeight:700}}>Registro Controlli</div>
          <div style={{fontSize:12,color:"#7a859e",marginTop:4,letterSpacing:"0.06em",textTransform:"uppercase"}}>Polizia Municipale</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Nome e Cognome *">
            <input style={INP} placeholder="Es. Mario Rossi" value={nome}
              onChange={e=>{setNome(e.target.value);setErrore("");}}
              onKeyDown={e=>e.key==="Enter"&&valid&&handleAccedi()}/>
          </Field>
          <Field label="Matricola">
            <input style={INP} placeholder="Es. Isp. 1234" value={matricola}
              onChange={e=>{setMatricola(e.target.value);setErrore("");}}
              onKeyDown={e=>e.key==="Enter"&&valid&&handleAccedi()}/>
          </Field>
          {errore&&(
            <div style={{background:"#3a1212",border:"1px solid #e0525240",borderRadius:7,padding:"10px 12px",fontSize:12,color:"#ff9090",lineHeight:1.5}}>
              🔒 {errore}
            </div>
          )}
          <button disabled={!valid||checking} onClick={handleAccedi} style={{
            marginTop:4,
            background:valid&&!checking?"#c9a84c":"#5a4a1e",
            color:valid&&!checking?"#0f1117":"#7a6030",
            fontSize:14,fontWeight:600,padding:"10px",border:"none",borderRadius:8,
            cursor:valid&&!checking?"pointer":"not-allowed"
          }}>{checking?"⏳ Verifica in corso…":"Accedi →"}</button>
        </div>
        <p style={{fontSize:11,color:"#7a859e",textAlign:"center",marginTop:16}}>Accesso riservato al personale autorizzato.</p>
      </div>
    </div>
  );
}

              return (

        <div style={{marginBottom:16}}><SecTitle icon="📜" text="Riferimenti normativi"/>{!r.riferimenti?.length?<span style={{fontSize:13,color:"#7a859e"}}>Nessuno</span>:<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{r.riferimenti.map((ref,i)=><Badge key={i} label={ref} fg="#c9a84c" bg="#3a2e0e"/>)}</div>}</div>
        {r.creatoDA&&<div style={{background:"#0f1117",border:"1px solid #2a3049",borderRadius:8,padding:"10px 14px",marginBottom:20,fontSize:12,color:"#7a859e"}}>

          {r.modificatoDa&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}><Avatar name={r.modificatoDa} size={20}/><span>Modificato da <b style={{color:"#e8e6df"}}>{r.modificatoDa}</b> · {fmtTs(r.modificatoIl)}</span></div>}
        </div>}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:16,borderTop:"1px solid #2a3049",flexWrap:"wrap",gap:8}}>

          <div style={{display:"flex",gap:8}}>

      </div>
    </Overlay>

}

// ─── EXPORT CSV ───────────────────────────────────────────────────────────────
function exportCSV(records){
  const h=["N. Verbale","Data","Ora","Esercizio","Indirizzo","Titolare","P.IVA","Tipo","Violazioni","Provvedimento","Note","Titoli Autorizzativi","Riferimenti","Agenti/Operatore"];
  const rows=records.map(r=>[r.numeroVerbale||"",fmt(r.data),r.ora||"",r.nomeEsercizio,r.indirizzo,r.titolare||"",r.piva||"",r.tipo||"",(r.motivoControllo||[]).join(" | "),r.provvedimento||"",r.note||"",(r.titoliAutorizzativi||[]).join(" | "),(r.riferimenti||[]).join(" | "),r._agenti||r.creatoDA||""]);
  const csv=[h,...rows].map(row=>row.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`controlli_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}



// ─── TARIFFARIO MODAL ────────────────────────────────────────────────────────
function TariffarioModal({tariffario, onClose, onSave}){
  const [voci, setVoci] = useState(tariffario.map(v=>({...v})));
  const [nuovaVoce, setNuovaVoce] = useState("");
  const [nuovoImporto, setNuovoImporto] = useState("");

  const aggiorna = (id, field, val) => setVoci(prev => prev.map(v => v.id===id ? {...v,[field]:val} : v));
  const elimina = id => setVoci(prev => prev.filter(v => v.id!==id));
  const aggiungi = () => {
    if(!nuovaVoce.trim() || !nuovoImporto) return;
    const newId = Math.max(0,...voci.map(v=>v.id))+1;
    setVoci(prev=>[...prev,{id:newId, voce:nuovaVoce.trim(), importo:parseFloat(nuovoImporto)||0}]);
    setNuovaVoce(""); setNuovoImporto("");
  };

  return (
    <Overlay onBgClick={onClose}>
      <div style={{background:"#181c27",border:"1px solid #2a3049",borderRadius:14,width:"100%",maxWidth:600,padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div>
            <div style={{fontFamily:"'Crimson Pro',Georgia,serif",fontSize:22,fontWeight:700}}>Tariffario sanzioni</div>
            <div style={{fontSize:12,color:"#7a859e",marginTop:3}}>Importi predefiniti — modificabili in qualsiasi momento</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#7a859e",cursor:"pointer",fontSize:24,lineHeight:1}}>×</button>
        </div>

        {/* Elenco voci */}
        <div style={{maxHeight:360,overflowY:"auto",marginBottom:16}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{borderBottom:"2px solid #2a3049"}}>
                <th style={{fontSize:10,color:"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",padding:"6px 8px",textAlign:"left",fontWeight:500}}>Voce di sanzione</th>
                <th style={{fontSize:10,color:"#7a859e",letterSpacing:"0.07em",textTransform:"uppercase",padding:"6px 8px",textAlign:"right",fontWeight:500,width:120}}>Importo (€)</th>
                <th style={{width:36}}></th>
              </tr>
            </thead>
            <tbody>
              {voci.map(v=>(
                <tr key={v.id} style={{borderBottom:"1px solid #2a3049"}}>
                  <td style={{padding:"8px"}}>
                    <input value={v.voce} onChange={e=>aggiorna(v.id,"voce",e.target.value)}
                      style={{...INP,fontSize:13,padding:"5px 8px"}}/>
                  </td>
                  <td style={{padding:"8px"}}>
                    <input type="number" value={v.importo} onChange={e=>aggiorna(v.id,"importo",parseFloat(e.target.value)||0)}
                      style={{...INP,fontSize:13,padding:"5px 8px",textAlign:"right"}}/>
                  </td>
                  <td style={{padding:"8px",textAlign:"center"}}>
                    <button onClick={()=>elimina(v.id)} style={{background:"none",border:"none",color:"#e05252",cursor:"pointer",fontSize:16}}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{background:"#0f1117",border:"1px solid #2a3049",borderRadius:8,padding:14,marginBottom:16}}>

    let tot = 0;
    const vociRecord = [...(record.violazioniRiscontrate||[]), ...(record.motivoControllo||[])];

    // Estrae le parole chiave significative da una stringa (ignora negazioni e parole vuote)
    const keywords = str => str.toLowerCase()
      .replace(/\b(mancante|mancanza|assenza|senza|no|non|di|del|della|il|la|lo|e|è|in|per|da|con|su)\b/g," ")

function ReportRAView({records}){
  // Mesi disponibili dai dati
  const mesiDisponibili = [...new Set(records.filter(r=>r.data).map(r=>r.data.slice(0,7)))].sort().reverse();
  const [mese,setMese] = useState(mesiDisponibili[0]||"");
  const [correzioni,setCorrezioni] = useState({}); // {regolaId: {controlli: n, violazioni: n}}

  const mesiNomi = ["","Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const labelMese = m => { if(!m) return "—"; const [y,mm]=m.split("-"); return `${mesiNomi[parseInt(mm)]} ${y}`; };

  // Record del mese selezionato
  const recordsMese = records.filter(r=>r.data && r.data.slice(0,7)===mese);

  // Calcola conteggi automatici per ogni voce
  const conteggi = REGOLE_RA.map(regola=>{
    const recordsVoce = recordsMese.filter(r=>recordInVoceRA(r,regola));
    const nControlli = recordsVoce.length;
    const nViolazioni = recordsMese.reduce((s,r)=>s+violazioniInVoceRA(r,regola),0);
    const corr = correzioni[regola.id]||{};
    return {
      ...regola,
      autoControlli: nControlli,
      autoViolazioni: nViolazioni,
      controlli: corr.controlli!==undefined?corr.controlli:nControlli,
      violazioni: corr.violazioni!==undefined?corr.violazioni:nViolazioni,
      records: recordsVoce,
    };
  });

  const setCorr = (id, field, val) => {
    setCorrezioni(prev=>({...prev,[id]:{...prev[id],[field]:val===""?undefined:parseInt(val)||0}}));

  const [sortDir,setSortDir]=useState("desc");

  useEffect(()=>{
    const cfg=localStorage.getItem(CFG_KEY); const op=sessionStorage.getItem(OP_KEY);
