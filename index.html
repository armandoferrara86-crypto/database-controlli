  const periodo = dal||al ? `${dal?fmtPdfDate(dal):"inizio"} — ${al?fmtPdfDate(al):"oggi"}` : "Tutti i periodi";

  const perViol = {};
  rs.forEach(r => {
    (r.violazioniRiscontrate||[]).forEach(v => {
      const k = v.trim();
      if(!perViol[k]) perViol[k] = {n:0, esercizi:new Set(), strade:new Set(), provvedimenti:{}};
      perViol[k].n++;
      perViol[k].esercizi.add((r.nomeEsercizio||"—").trim());
      perViol[k].strade.add((r.indirizzo||"").replace(/\s+\d.*$/,"").trim());
      const provs = (r.provvedimenti||[]).filter(p=>p.tipo).map(p=>p.tipo);
      if(!provs.length && r.provvedimento) provs.push(r.provvedimento);
      provs.forEach(p=>{ perViol[k].provvedimenti[p]=(perViol[k].provvedimenti[p]||0)+1; });
    });
  });

  const violList = Object.entries(perViol).sort(([,a],[,b])=>b.n-a.n);
  const maxV = violList.length>0 ? violList[0][1].n : 1;
  const totV = violList.reduce((s,[,d])=>s+d.n,0);

  const html = `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/>
  <title>Tabulato per Violazione</title><style>${CSS_BASE}</style></head><body>
  <div class="hdr">
    <div><h1>🚨 Tabulato Controlli per Violazione</h1>
      <div style="font-size:8pt;color:#555;margin-top:3px">Periodo: ${periodo} · ${totV} violazioni su ${rs.length} controlli</div>
    </div>
    <div class="hdr-r">U.O. San Lorenzo — Polizia Amministrativa<br/>Generato il ${oggi}</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-v">${rs.length}</div><div class="kpi-l">Totale controlli</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#c0392b">${totV}</div><div class="kpi-l">Totale violazioni</div></div>
    <div class="kpi"><div class="kpi-v">${violList.length}</div><div class="kpi-l">Tipologie violazioni</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#c0392b">${rs.length>0?Math.round(rs.filter(r=>(r.violazioniRiscontrate||[]).length>0).length/rs.length*100):0}%</div><div class="kpi-l">Controlli con violazioni</div></div>
  </div>

  ${violList.length===0
    ? `<div style="text-align:center;padding:30px;color:#888;font-size:10pt">Nessuna violazione registrata nel periodo selezionato</div>`
    : `<table>
    <thead><tr>
      <th style="width:30px">#</th>
      <th>Tipo di violazione</th>
      <th style="width:60px;text-align:center">Casi</th>
      <th style="width:55px;text-align:center">%</th>
      <th style="width:60px;text-align:center">Esercizi</th>
      <th style="width:55px;text-align:center">Strade</th>
      <th>Provvedimenti associati</th>
      <th style="width:110px">Frequenza</th>
    </tr></thead>
    <tbody>
      ${violList.map(([v,d],i)=>`
        <tr>
          <td style="color:#777;font-size:7.5pt">${i+1}</td>
          <td><b style="color:#c0392b">${v}</b></td>
          <td style="text-align:center"><span class="num" style="color:#c0392b">${d.n}</span></td>
          <td style="text-align:center;font-size:7.5pt">${Math.round(d.n/totV*100)}%</td>
          <td style="text-align:center">${d.esercizi.size}</td>
          <td style="text-align:center">${d.strade.size}</td>
          <td style="font-size:7.5pt">${Object.entries(d.provvedimenti).map(([p,n])=>`<span class="pill" style="background:${provColorPdf(p)}">${p}(${n})</span>`).join(" ")||"—"}</td>
          <td>
            <div class="bar-wrap">
              <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.n/maxV*100)}%;background:#c0392b"></div></div>
              <span style="font-size:7pt;color:#c0392b;font-weight:bold">${d.n}</span>
            </div>
          </td>
        </tr>
        <tr><td colspan="8" style="padding:0 8px 7px;font-size:7pt;color:#888;background:#fff8f8;border-bottom:2px solid #f0d0d0">
          Esercizi coinvolti: ${[...d.esercizi].slice(0,6).join(", ")}${d.esercizi.size>6?` … +${d.esercizi.size-6} altri`:""}
        </td></tr>
      `).join("")}
    </tbody>
  </table>`}
  <div class="footer">
    <span>Polizia Municipale di Napoli — U.O. San Lorenzo</span>
    <span>Generato il ${oggi}</span>
  </div>
  <script>window.onload=function(){window.print()};<\/script>
  </body></html>`;
  apriPdf(html);
}

// ── 4. RIEPILOGO PER ESERCIZIO ──
function generaRiepilogoEsercizi(records, dal, al) {
  const rs = filtraPerPeriodo(records, dal, al);
  const oggi = new Date().toLocaleDateString("it-IT");
  const periodo = dal||al ? `${dal?fmtPdfDate(dal):"inizio"} — ${al?fmtPdfDate(al):"oggi"}` : "Tutti i periodi";

  const perEs = {};
  rs.forEach(r => {
    const k = (r.nomeEsercizio||"—").trim();
    if(!perEs[k]) perEs[k] = {nome:r.nomeEsercizio||"—", indirizzo:r.indirizzo||"—", titolare:r.legaleRappresentante||r.titolare||"—", tipo:r.tipo||"—", tipoAttivita:r.tipoAttivita||"—", controlli:0, violazioni:0, provvedimenti:{}, ultime:[], titoliSet:new Set()};
    perEs[k].controlli++;
    perEs[k].violazioni += (r.violazioniRiscontrate||[]).length;
    const provs = (r.provvedimenti||[]).filter(p=>p.tipo).map(p=>p.tipo);
    if(!provs.length && r.provvedimento) provs.push(r.provvedimento);
    provs.forEach(p=>{ perEs[k].provvedimenti[p]=(perEs[k].provvedimenti[p]||0)+1; });
    (r.titoliAutorizzativi||[]).forEach(t=>perEs[k].titoliSet.add(t));
    perEs[k].ultime.push(r.data||"");
  });

  const lista = Object.values(perEs).sort((a,b)=>b.controlli-a.controlli);

  const html = `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/>

  .es-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #e8edf5}
  .es-nome{font-size:10pt;font-weight:bold;color:#1a3a6e}
  .es-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 16px;font-size:7.5pt}
  .es-field label{color:#777;display:block;font-size:6.5pt;text-transform:uppercase;letter-spacing:.05em}
  </style></head><body>
  <div class="hdr">
    <div><h1>🏪 Riepilogo per Esercizio Commerciale</h1>
      <div style="font-size:8pt;color:#555;margin-top:3px">Periodo: ${periodo} · ${lista.length} esercizi · ${rs.length} controlli</div>
    </div>
    <div class="hdr-r">U.O. San Lorenzo — Polizia Amministrativa<br/>Generato il ${oggi}</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-v">${lista.length}</div><div class="kpi-l">Esercizi controllati</div></div>
    <div class="kpi"><div class="kpi-v">${rs.length}</div><div class="kpi-l">Totale controlli</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#c0392b">${lista.filter(e=>e.violazioni>0).length}</div><div class="kpi-l">Esercizi con violazioni</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#d4961a">${lista.length>0?lista[0].nome.substring(0,18):"-"}</div><div class="kpi-l">Più controllato</div></div>
  </div>

  ${lista.map(e=>{
    const provStr = Object.entries(e.provvedimenti).map(([p,n])=>`<span class="pill" style="background:${provColorPdf(p)}">${p}(${n})</span>`).join(" ")||"<span style='color:#1e8449'>Nessuno</span>";
    const dateOrd = e.ultime.filter(Boolean).sort();
    const ultimaData = dateOrd.length>0?fmtPdfDate(dateOrd[dateOrd.length-1]):"—";
    const primaData  = dateOrd.length>0?fmtPdfDate(dateOrd[0]):"—";
    return `<div class="es-card">
      <div class="es-header">
        <div>
          <div class="es-nome">${e.nome}</div>
          <div style="font-size:7.5pt;color:#555;margin-top:1px">${e.indirizzo}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14pt;font-weight:bold;color:#1a3a6e;line-height:1">${e.controlli}</div>
          <div style="font-size:6.5pt;color:#777">controlli</div>
          ${e.violazioni>0?`<div style="font-size:9pt;font-weight:bold;color:#c0392b;margin-top:2px">${e.violazioni} viol.</div>`:""}
        </div>
      </div>
      <div class="es-grid">
        <div class="es-field"><label>Titolare/L.R.</label>${e.titolare}</div>

        <div class="es-field"><label>Primo controllo</label>${primaData}</div>
        <div class="es-field"><label>Ultimo controllo</label>${ultimaData}</div>
        <div class="es-field"><label>Provvedimenti</label>${provStr}</div>
        <div class="es-field"><label>Titoli autoriz.</label><span style="font-size:7pt;color:#2471a3">${[...e.titoliSet].slice(0,3).join(", ")||"—"}</span></div>
      </div>
    </div>`;

  <div class="footer">
    <span>Polizia Municipale di Napoli — U.O. San Lorenzo</span>
    <span>Generato il ${oggi}</span>

  apriPdf(html);
}

// ── 5. TOTALI E KPI ──
function generaTotaliKpi(records, dal, al) {
  const rs = filtraPerPeriodo(records, dal, al);
  const oggi = new Date().toLocaleDateString("it-IT");
  const periodo = dal||al ? `${dal?fmtPdfDate(dal):"inizio"} — ${al?fmtPdfDate(al):"oggi"}` : "Tutti i periodi";

  // aggregazioni
  const perMese={}, perProv={}, perViol={}, perAgente={}, perTipo={}, perStrada={};
  rs.forEach(r=>{
    if(r.data){ const [y,m]=r.data.split("-"); const k=`${y}-${m}`; perMese[k]=(perMese[k]||0)+1; }
    const provs=(r.provvedimenti||[]).filter(p=>p.tipo).map(p=>p.tipo);
    if(!provs.length&&r.provvedimento) provs.push(r.provvedimento);
    provs.forEach(p=>{ perProv[p]=(perProv[p]||0)+1; });
    (r.violazioniRiscontrate||[]).forEach(v=>{ const k=v.trim(); perViol[k]=(perViol[k]||0)+1; });
    const ags=(Array.isArray(r.agentiOp)&&r.agentiOp.length>0)?r.agentiOp:(r.agentiOp?r.agentiOp.split(",").map(s=>s.trim()).filter(Boolean):(r._agenti?r._agenti.split(",").map(s=>s.trim()).filter(Boolean):[r.creatoDA||""]));
    ags.forEach(a=>{ if(a) perAgente[a]=(perAgente[a]||0)+1; });
    const t=(r.tipo||"Non specificato").trim(); perTipo[t]=(perTipo[t]||0)+1;
    const via=(r.indirizzo||"—").replace(/\s+\d.*$/,"").trim(); perStrada[via]=(perStrada[via]||0)+1;
  });

  const mesiSorted=Object.entries(perMese).sort(([a],[b])=>a.localeCompare(b));
  const provList=Object.entries(perProv).sort(([,a],[,b])=>b-a);
  const violList=Object.entries(perViol).sort(([,a],[,b])=>b-a).slice(0,8);
  const agentiList=Object.entries(perAgente).sort(([,a],[,b])=>b-a).slice(0,8);
  const tipoList=Object.entries(perTipo).sort(([,a],[,b])=>b-a).slice(0,6);
  const stradaList=Object.entries(perStrada).sort(([,a],[,b])=>b-a).slice(0,8);
  const totViol=rs.reduce((s,r)=>s+(r.violazioniRiscontrate?.length||0),0);
  const conViol=rs.filter(r=>(r.violazioniRiscontrate||[]).length>0).length;
  const mesiLabel=k=>{ const [y,m]=k.split("-"); const n=["","Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"]; return `${n[parseInt(m)]} ${y}`; };
  const bar=(v,max,col="#1a3a6e")=>`<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${col}"></div></div><span style="font-size:7pt;font-weight:bold;color:${col}">${v}</span></div>`;

  const html=`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/>
  <title>Totali e KPI</title><style>${CSS_BASE}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:4px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:4px}
  </style></head><body>
  <div class="hdr">
    <div><h1>📊 Totali e KPI — Controlli Commerciali</h1>
      <div style="font-size:8pt;color:#555;margin-top:3px">Periodo: ${periodo}</div>
    </div>
    <div class="hdr-r">U.O. San Lorenzo — Polizia Amministrativa<br/>Generato il ${oggi}</div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">
    <div class="kpi"><div class="kpi-v">${rs.length}</div><div class="kpi-l">Totale controlli</div></div>
    <div class="kpi"><div class="kpi-v">${[...new Set(rs.map(r=>(r.nomeEsercizio||"").trim().toLowerCase()).filter(Boolean))].length}</div><div class="kpi-l">Esercizi unici</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#c0392b">${totViol}</div><div class="kpi-l">Violazioni totali</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#c0392b">${rs.length>0?Math.round(conViol/rs.length*100):0}%</div><div class="kpi-l">% con violazioni</div></div>
    <div class="kpi"><div class="kpi-v" style="color:#d4961a">${Object.keys(perStrada).length}</div><div class="kpi-l">Strade controllate</div></div>
  </div>

  <div class="sec-title">📅 Andamento mensile</div>
  <table><thead><tr><th>Mese</th><th>Controlli</th><th style="width:60%">Grafico</th></tr></thead><tbody>
    ${mesiSorted.map(([k,v])=>`<tr><td>${mesiLabel(k)}</td><td style="font-weight:bold;color:#1a3a6e">${v}</td><td>${bar(v,Math.max(...mesiSorted.map(([,x])=>x),1))}</td></tr>`).join("")}
  </tbody></table>

  <div class="two">
    <div>
      <div class="sec-title">⚖️ Provvedimenti adottati</div>
      <table><thead><tr><th>Provvedimento</th><th>N.</th><th>%</th></tr></thead><tbody>
        ${provList.map(([p,n])=>`<tr><td><span class="pill" style="background:${provColorPdf(p)}">${p}</span></td><td style="font-weight:bold">${n}</td><td style="color:#777">${Math.round(n/rs.length*100)}%</td></tr>`).join("")||`<tr><td colspan="3" style="color:#888">Nessun provvedimento</td></tr>`}
      </tbody></table>

      <div class="sec-title">🏷️ Tipo attività</div>
      <table><thead><tr><th>Tipo</th><th>N.</th><th style="width:50%">Grafico</th></tr></thead><tbody>
        ${tipoList.map(([t,n])=>`<tr><td>${t}</td><td style="font-weight:bold">${n}</td><td>${bar(n,tipoList[0][1],"#2471a3")}</td></tr>`).join("")}
      </tbody></table>
    </div>
    <div>
      <div class="sec-title">🚨 Top violazioni</div>
      <table><thead><tr><th>Violazione</th><th>N.</th><th style="width:40%">Grafico</th></tr></thead><tbody>
        ${violList.length>0?violList.map(([v,n])=>`<tr><td style="font-size:7.5pt">${v}</td><td style="font-weight:bold;color:#c0392b">${n}</td><td>${bar(n,violList[0][1],"#c0392b")}</td></tr>`).join(""):`<tr><td colspan="3" style="color:#888">Nessuna violazione</td></tr>`}
      </tbody></table>

      <div class="sec-title">👮 Agenti più attivi</div>
      <table><thead><tr><th>Agente</th><th>N.</th><th style="width:40%">Grafico</th></tr></thead><tbody>
        ${agentiList.map(([a,n])=>`<tr><td>${a}</td><td style="font-weight:bold">${n}</td><td>${bar(n,agentiList[0][1],"#7d3c98")}</td></tr>`).join("")}
      </tbody></table>
    </div>
  </div>

  <div class="sec-title">🗺️ Top strade per numero controlli</div>
  <table><thead><tr><th>Via / Indirizzo</th><th>Controlli</th><th style="width:55%">Grafico</th></tr></thead><tbody>
    ${stradaList.map(([v,n])=>`<tr><td>${v}</td><td style="font-weight:bold">${n}</td><td>${bar(n,stradaList[0][1])}</td></tr>`).join("")}
  </tbody></table>

  <div class="footer">
    <span>Polizia Municipale di Napoli — U.O. San Lorenzo</span>
    <span>Generato il ${oggi}</span>
  </div>
  <script>window.onload=function(){window.print()};<\/script>
  </body></html>`;
  apriPdf(html);
}
